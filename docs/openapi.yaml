  ############################################################################
  # MENSTRUAL CYCLE
  ############################################################################

  /menstrual-cycle:
    post:
      tags: [MenstrualCycle]
      summary: "Enregistrer une entrée de cycle menstruel"
      description: >
        Crée une entrée de cycle menstruel pour l'utilisatrice connectée.

        **Protection :** Cette route est protégée par `genderGuard(['female'])`
        en plus de l'authentification standard — seules les utilisatrices
        de genre `female` peuvent enregistrer leurs cycles. Un partenaire
        avec accès partagé **ne peut pas** créer d'entrée pour une autre
        personne (réservée à la propriétaire).

        **Champs :**
        - `periodStartDate` (required) : date de début des règles en
          format `YYYY-MM-DD`. Ne peut pas être dans le futur. Indexé
          unique avec `userId` (pas de doublon possible pour une même
          date).
        - `periodEndDate` (optionnel) : doit être après
          `periodStartDate` et ne pas dépasser 10 jours d'écart
        - `flow` (optionnel) : flux menstruel (`light`, `medium`,
          `heavy`)
        - `symptoms` (optionnel) : tableau de symptômes (cramps,
          headache, fatigue, bloating, breast_tenderness, mood_swings,
          nausea, back_pain, acne, spotting, insomnia, dizziness)
        - `notes` (optionnel) : notes libres (max 500 caractères)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCycleEntryInput"
            example:
              periodStartDate: "2025-06-15"
              periodEndDate: "2025-06-19"
              flow: "medium"
              symptoms: ["cramps", "fatigue"]
      responses:
        "201":
          description: "Entrée de cycle créée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Cycle entry created"
                data:
                  entry:
                    _id: "664a1b2c3d4e5f6a7b8c9d0e"
                    userId: "664a1b2c3d4e5f6a7b8c9d0f"
                    periodStartDate: "2025-06-15T00:00:00.000Z"
                    periodEndDate: "2025-06-19T00:00:00.000Z"
                    flow: "medium"
                    symptoms: ["cramps", "fatigue"]
                    createdAt: "2025-06-15T08:00:00.000Z"
                    updatedAt: "2025-06-15T08:00:00.000Z"
        "400":
          description: "Données invalides (validation Zod)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                endBeforeStart:
                  summary: "periodEndDate avant periodStartDate"
                  value:
                    success: false
                    message: "Validation échouée"
                    details:
                      - code: "custom"
                        path: ["periodEndDate"]
                        message: "periodEndDate must be after periodStartDate"
                periodTooLong:
                  summary: "Écart > 10 jours"
                  value:
                    success: false
                    message: "Validation échouée"
                    details:
                      - code: "custom"
                        path: ["periodEndDate"]
                        message: "periodEndDate must not exceed 10 days after periodStartDate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Genre non autorisé (genderGuard : seules les femmes peuvent créer des entrées)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: "Entrée déjà existante pour cette date (contrainte unique userId + periodStartDate)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "A cycle entry already exists for this date"

  /menstrual-cycle/{ownerId}/history:
    get:
      tags: [MenstrualCycle]
      summary: "Historique des cycles"
      description: >
        Retourne l'historique des cycles menstruels.

        **Contrôle d'accès :**
        - Si `ownerId` correspond à l'utilisateur connecté, accès direct
        - Sinon, nécessite un `DataShare` actif avec `scope:
          "menstrual_cycle"` entre la propriétaire et l'utilisateur
          connecté (vérifié par `sharedAccessGuard`), sinon 403

        Les paramètres `fromDate` et `toDate` filtrent par plage de
        dates sur `periodStartDate`. Le paramètre `limit` contrôle le
        nombre de résultats.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: ownerId
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{24}$"
          description: "ObjectId de la propriétaire des données"
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
          description: "Nombre d'entrées (doit être un entier positif)"
        - in: query
          name: fromDate
          required: false
          schema:
            type: string
            format: date
          description: "Borne inférieure (incluse) sur periodStartDate (format YYYY-MM-DD)"
        - in: query
          name: toDate
          required: false
          schema:
            type: string
            format: date
          description: "Borne supérieure (incluse) sur periodStartDate (format YYYY-MM-DD)"
      responses:
        "200":
          description: "Historique récupéré"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Cycle history retrieved"
                data:
                  entries:
                    - _id: "664a1b2c3d4e5f6a7b8c9d0e"
                      userId: "664a1b2c3d4e5f6a7b8c9d0f"
                      periodStartDate: "2025-06-15T00:00:00.000Z"
                      periodEndDate: "2025-06-19T00:00:00.000Z"
                      flow: "medium"
                      symptoms: ["cramps", "fatigue"]
                      createdAt: "2025-06-15T08:00:00.000Z"
                      updatedAt: "2025-06-15T08:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Accès non partagé (sharedAccessGuard)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /menstrual-cycle/{ownerId}/stats:
    get:
      tags: [MenstrualCycle]
      summary: "Statistiques du cycle"
      description: >
        Retourne les statistiques du cycle menstruel : durée moyenne,
        régularité et niveau de confiance.

        **Contrôle d'accès :** Même mécanisme que `/history` — si
        `ownerId` n'est pas l'utilisateur connecté, un DataShare actif
        avec `scope: "menstrual_cycle"` est requis.

        **Niveau de confiance (`confidenceLevel`) :**
        - `"low"` : moins de 3 cycles analysés, ou cycles irréguliers
        - `"medium"` : 3 à 5 cycles réguliers
        - `"high"` : plus de 5 cycles réguliers

        Si moins de 2 entrées sont enregistrées, `averageLength` est
        `null` et `cyclesAnalyzed` est 0.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: ownerId
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{24}$"
          description: "ObjectId de la propriétaire des données"
      responses:
        "200":
          description: "Statistiques récupérées"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Cycle stats retrieved"
                data:
                  stats:
                    averageLength: 28
                    isRegular: true
                    confidenceLevel: "high"
                    cyclesAnalyzed: 6
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Accès non partagé (sharedAccessGuard)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /menstrual-cycle/{ownerId}/prediction:
    get:
      tags: [MenstrualCycle]
      summary: "Prédiction des prochaines règles"
      description: >
        Prédit la date estimée des prochaines règles à partir des
        cycles enregistrés.

        **Contrôle d'accès :** Même mécanisme que `/history` — accès
        direct si `ownerId` correspond à l'utilisateur connecté,
        sinon DataShare actif requis.

        **Plages selon `confidenceLevel` :**
        - `"high"` : plage de ±2 jours autour de la date estimée
        - `"medium"` : plage de ±4 jours
        - `"low"` : plage de ±7 jours

        Si les données sont insuffisantes (`averageLength === null`),
        retourne une erreur 400 avec un message invitant à continuer
        d'enregistrer les cycles.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: ownerId
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{24}$"
          description: "ObjectId de la propriétaire des données"
      responses:
        "200":
          description: "Prédiction calculée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Next period prediction"
                data:
                  estimatedDate: "2025-07-13T00:00:00.000Z"
                  rangeStart: "2025-07-11T00:00:00.000Z"
                  rangeEnd: "2025-07-15T00:00:00.000Z"
                  confidenceLevel: "high"
                  basedOnCyclesCount: 6
        "400":
          description: "Données insuffisantes pour la prédiction"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Pas assez de données pour estimer votre cycle, continuez à enregistrer vos prochaines règles"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Accès non partagé (sharedAccessGuard)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /menstrual-cycle/{ownerId}/fertile-window:
    get:
      tags: [MenstrualCycle]
      summary: "Fenêtre de fertilité"
      description: >
        Prédit la fenêtre de fertilité (période d'ovulation estimée
        et fenêtre fertile élargie).

        **Contrôle d'accès :** Même mécanisme que `/history`.

        **Disclaimer obligatoire :**
        La réponse inclut toujours un champ `disclaimer` dont le texte
        exact est le suivant :

        > *"Cette estimation est basée sur un calcul calendaire et ne
        constitue pas une méthode fiable de contraception ou de
        conception. Les cycles naturels varient et l'ovulation peut
        survenir à des dates différentes de cette estimation.
        Consultez un professionnel de santé pour des méthodes de suivi
        de fertilité plus précises si nécessaire."*

        **Plages selon `confidenceLevel` :**
        Le niveau de confiance (`"low"`, `"medium"`, `"high"`) élargit
        ou réduit les plages : plus le niveau est élevé, plus la
        fenêtre est resserrée autour de la date d'ovulation estimée.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: ownerId
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{24}$"
          description: "ObjectId de la propriétaire des données"
      responses:
        "200":
          description: "Fenêtre de fertilité calculée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Fertile window prediction"
                data:
                  estimatedOvulationDate: "2025-06-29T00:00:00.000Z"
                  fertileWindowStart: "2025-06-24T00:00:00.000Z"
                  fertileWindowEnd: "2025-07-01T00:00:00.000Z"
                  confidenceLevel: "high"
                  basedOnCyclesCount: 6
                  disclaimer: "Cette estimation est basée sur un calcul calendaire et ne constitue pas une méthode fiable de contraception ou de conception. Les cycles naturels varient et l'ovulation peut survenir à des dates différentes de cette estimation. Consultez un professionnel de santé pour des méthodes de suivi de fertilité plus précises si nécessaire."
        "400":
          description: "Données insuffisantes"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Pas assez de données pour estimer votre fenêtre de fertilité, continuez à enregistrer vos prochaines règles"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Accès non partagé (sharedAccessGuard)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /menstrual-cycle/{ownerId}/{id}:
    delete:
      tags: [MenstrualCycle]
      summary: "Supprimer une entrée de cycle"
      description: >
        Supprime une entrée de cycle menstruel.

        **Réservée à la propriétaire uniquement :** contrairement aux
        routes GET (qui peuvent être consultées via un partage), la
        suppression est **exclusivement réservée à l'utilisatrice
        propriétaire** des données. Un partenaire avec accès partagé
        ne peut pas supprimer une entrée. Le contrôle se fait par
        comparaison directe `req.user!.userId !== ownerId` dans le
        contrôleur (403).
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: ownerId
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{24}$"
          description: "ObjectId de la propriétaire"
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{24}$"
          description: "ObjectId de l'entrée de cycle"
      responses:
        "200":
          description: "Entrée supprimée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Cycle entry deleted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Tentative de suppression par un partenaire ou un autre utilisateur"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "You can only delete your own cycle entries"
        "404":
          description: "Entrée introuvable"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Cycle entry not found"

  ############################################################################
  # PREGNANCY
  ############################################################################

  /pregnancy:
    post:
      tags: [Pregnancy]
      summary: "Démarrer un suivi de grossesse"
      description: >
        Crée un profil de grossesse avec calcul de la date d'accouchement
        (DDR) selon la méthode choisie.

        **Protection :** Toutes les routes Pregnancy sont protégées par
        `genderGuard(['female'])` en plus de l'authentification standard
        (réservé aux utilisatrices de genre `female`).

        **Méthodes de calcul :**
        - `"lmp"` : basé sur la date des dernières règles. La DDR est
          calculée selon la **règle de Naegele** (DDR + 280 jours).
          Le champ `lastMenstrualPeriod` est requis ; `conceptionDate`
          ne doit pas être fourni.
        - `"conception"` : basé sur la date de conception présumée.
          La DDR est calculée comme conception + 266 jours. Le champ
          `conceptionDate` est requis ; `lastMenstrualPeriod` ne doit
          pas être fourni.

        **Contraintes de validation (superRefine) :**
        - `calculationMethod === "lmp"` → `lastMenstrualPeriod` requis,
          doit être ≤ aujourd'hui et ≤ 301 jours (43 sem.) dans le passé
        - `calculationMethod === "conception"` → `conceptionDate`
          requis, doit être ≤ aujourd'hui et ≤ 287 jours (41 sem.)
          dans le passé
        - Les deux dates s'excluent mutuellement

        **Règle d'unicité :** Une seule grossesse active
        (`isActive: true`) par utilisatrice à la fois. Une tentative
        d'en créer une seconde retourne 409. Une fois close, une
        nouvelle peut être démarrée.

        **DDR figée :** La `dueDate` est calculée **une seule fois**
        à la création et stockée en base. Elle n'est jamais recalculée
        dynamiquement (les calculs d'âge gestationnel se basent sur
        cette valeur figée et la date courante).

        **Milestones de grossesse :**
        Le contenu des jalons (`pregnancyMilestones.data.ts`) est
        sourcé depuis des références médicales reconnues (Mayo Clinic,
        ACOG, Cleveland Clinic, NHS) et couvre les semaines 1 à 40.
        La documentation API décrit la structure de réponse sans
        dupliquer le contenu détaillé des jalons.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePregnancyInput"
            examples:
              lmp:
                summary: "Méthode LMP"
                value:
                  calculationMethod: "lmp"
                  lastMenstrualPeriod: "2025-03-01"
              conception:
                summary: "Méthode conception"
                value:
                  calculationMethod: "conception"
                  conceptionDate: "2025-03-15"
      responses:
        "201":
          description: "Profil de grossesse créé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Pregnancy profile created"
                data:
                  pregnancy:
                    _id: "664a1b2c3d4e5f6a7b8c9d0e"
                    userId: "664a1b2c3d4e5f6a7b8c9d0f"
                    calculationMethod: "lmp"
                    lastMenstrualPeriod: "2025-03-01T00:00:00.000Z"
                    dueDate: "2025-12-06T00:00:00.000Z"
                    isActive: true
                    createdAt: "2025-06-15T08:00:00.000Z"
                    updatedAt: "2025-06-15T08:00:00.000Z"
        "400":
          description: "Données invalides"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingLmp:
                  summary: "LMP manquant pour méthode lmp"
                  value:
                    success: false
                    message: "Validation échouée"
                    details:
                      - code: "custom"
                        path: ["lastMenstrualPeriod"]
                        message: "lastMenstrualPeriod is required when calculationMethod is 'lmp'"
                wrongDateProvided:
                  summary: "conceptionDate fourni avec méthode lmp"
                  value:
                    success: false
                    message: "Validation échouée"
                    details:
                      - code: "custom"
                        path: ["conceptionDate"]
                        message: "conceptionDate must not be provided when calculationMethod is 'lmp'"
                tooOld:
                  summary: "Date trop ancienne (incohérente avec grossesse active)"
                  value:
                    success: false
                    message: "Validation échouée"
                    details:
                      - code: "custom"
                        path: ["lastMenstrualPeriod"]
                        message: "lastMenstrualPeriod is more than 43 weeks ago, which is inconsistent with an active pregnancy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Genre non autorisé (genderGuard : réservé aux femmes)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: "Une grossesse active existe déjà"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Une grossesse est déjà en cours de suivi, terminez-la avant d'en démarrer une nouvelle"

  /pregnancy/current:
    get:
      tags: [Pregnancy]
      summary: "Grossesse active en cours"
      description: >
        Retourne le profil de grossesse actif (isActive: true) de
        l'utilisatrice connectée. **La réponse peut être
        `{ data: { pregnancy: null } }` si aucune grossesse active
        n'existe — ce n'est PAS une erreur 404.**
      security:
        - cookieAuth: []
      responses:
        "200":
          description: "Grossesse active (peut être null)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              examples:
                found:
                  summary: "Grossesse active trouvée"
                  value:
                    success: true
                    message: "Active pregnancy retrieved"
                    data:
                      pregnancy:
                        _id: "664a1b2c3d4e5f6a7b8c9d0e"
                        userId: "664a1b2c3d4e5f6a7b8c9d0f"
                        calculationMethod: "lmp"
                        lastMenstrualPeriod: "2025-03-01T00:00:00.000Z"
                        dueDate: "2025-12-06T00:00:00.000Z"
                        isActive: true
                        createdAt: "2025-06-15T08:00:00.000Z"
                        updatedAt: "2025-06-15T08:00:00.000Z"
                notFound:
                  summary: "Aucune grossesse active"
                  value:
                    success: true
                    message: "No active pregnancy"
                    data:
                      pregnancy: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Genre non autorisé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pregnancy/progress:
    get:
      tags: [Pregnancy]
      summary: "Progression de la grossesse"
      description: >
        Retourne la progression détaillée de la grossesse active :
        âge gestationnel, jours restants avant la DDR, et jalon
        correspondant à la semaine en cours.

        **Structure de réponse :**
        - `pregnancy` : le profil de grossesse
        - `gestationalAge` : `{ weeks, days, trimester (1|2|3),
          anomaly }` calculé par `calculateGestationalAge` à partir
          de la `dueDate` figée et de la date courante
        - `daysUntilDueDate` : nombre de jours avant la DDR. **Peut
          être négatif** si le terme est dépassé (post-term). Le
          message reste factuel et non alarmiste, orientant vers un
          professionnel de santé si nécessaire.
        - `currentMilestone` : jalon de la semaine en cours (objet
          avec `{ weekNumber, title, description, icon }`) ou `null`
          si en période pré-conception (`anomaly: "pre_conception"`).
          Les jalons sont sourcés depuis Mayo Clinic, ACOG, Cleveland
          Clinic et NHS.

        Retourne 400 si aucune grossesse active n'existe.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: "Progression récupérée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Pregnancy progress retrieved"
                data:
                  pregnancy:
                    _id: "664a1b2c3d4e5f6a7b8c9d0e"
                    userId: "664a1b2c3d4e5f6a7b8c9d0f"
                    calculationMethod: "lmp"
                    lastMenstrualPeriod: "2025-03-01T00:00:00.000Z"
                    dueDate: "2025-12-06T00:00:00.000Z"
                    isActive: true
                    createdAt: "2025-06-15T08:00:00.000Z"
                    updatedAt: "2025-06-15T08:00:00.000Z"
                  gestationalAge:
                    weeks: 15
                    days: 2
                    trimester: 2
                    anomaly: null
                  daysUntilDueDate: 174
                  currentMilestone:
                    weekNumber: 15
                    title: "Semaine 15"
                    description: "Bébé bouge et entend votre voix."
                    icon: "🤰"
        "400":
          description: "Aucune grossesse active"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Aucune grossesse active trouvée"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Genre non autorisé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pregnancy/{id}/close:
    patch:
      tags: [Pregnancy]
      summary: "Clôturer une grossesse"
      description: >
        Ferme un profil de grossesse en passant `isActive` à `false`.
        Cela libère la possibilité d'en suivre une nouvelle tout en
        conservant l'historique. Seule la propriétaire peut clôturer
        sa grossesse (vérification IDOR).

        Le champ optionnel `outcome` permet de documenter l'issue
        (`live_birth`, `stillbirth`, `miscarriage`, `abortion`,
        `other`).
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{24}$"
          description: "ObjectId du profil de grossesse à clôturer"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                outcome:
                  type: string
                  enum: [live_birth, stillbirth, miscarriage, abortion, other]
                  description: "Issue de la grossesse (optionnelle)"
                  example: "live_birth"
      responses:
        "200":
          description: "Profil de grossesse clôturé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Pregnancy profile closed"
                data:
                  pregnancy:
                    _id: "664a1b2c3d4e5f6a7b8c9d0e"
                    userId: "664a1b2c3d4e5f6a7b8c9d0f"
                    calculationMethod: "lmp"
                    lastMenstrualPeriod: "2025-03-01T00:00:00.000Z"
                    dueDate: "2025-12-06T00:00:00.000Z"
                    isActive: false
                    outcome: "live_birth"
                    createdAt: "2025-06-15T08:00:00.000Z"
                    updatedAt: "2025-12-06T08:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Genre non autorisé ou tentative de clôture d'une grossesse ne vous appartenant pas"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "You can only close your own pregnancy profile"
        "404":
          description: "Profil de grossesse introuvable"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Pregnancy profile not found"

  /pregnancy/history:
    get:
      tags: [Pregnancy]
      summary: "Historique des grossesses"
      description: >
        Liste toutes les grossesses (actives et fermées) de
