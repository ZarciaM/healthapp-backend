  ############################################################################
  # DATA SHARING
  ############################################################################

  /data-sharing/invitations:
    post:
      tags: [DataSharing]
      summary: "Créer une invitation de partage"
      description: >
        Crée un `DataShare` en base avec `status: "pending"` et tente
        d'envoyer un email d'invitation au partenaire.

        **Flow de bout en bout :**
        1. L'utilisateur A (owner) envoie une invitation à l'email du
           partenaire B, avec un `scope` (actuellement uniquement
           `"menstrual_cycle"`)
        2. Un `invitationToken` cryptographique (randomBytes 32) est
           généré et stocké en base — **jamais exposé dans la réponse
           API**, uniquement transmis par email
        3. Le champ `emailSentSuccessfully` indique si l'email a été
           délivré avec succès. Si `false`, l'invitation existe quand
           même en base et peut être renvoyée via `POST /resend`

        **Contrôles métier :**
        - Impossible de s'inviter soi-même (400)
        - Une invitation active (pending/accepted) pour le même
          (owner, partnerEmail, scope) déjà existante → 409
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationInput"
            example:
              partnerEmail: "partner@example.com"
              scope: "menstrual_cycle"
      responses:
        "201":
          description: "Invitation créée (email envoyé ou non)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Invitation sent"
                data:
                  share:
                    _id: "664a1b2c3d4e5f6a7b8c9d0e"
                    ownerId: "664a1b2c3d4e5f6a7b8c9d0f"
                    partnerEmail: "partner@example.com"
                    scope: "menstrual_cycle"
                    status: "pending"
                    emailSentSuccessfully: true
                    invitedAt: "2025-06-15T08:00:00.000Z"
                    createdAt: "2025-06-15T08:00:00.000Z"
                    updatedAt: "2025-06-15T08:00:00.000Z"
        "400":
          description: "Données invalides ou auto-invitation"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                selfInvite:
                  summary: "Auto-invitation"
                  value:
                    success: false
                    message: "You cannot invite yourself"
                wrongScope:
                  summary: "Scope invalide"
                  value:
                    success: false
                    message: "Validation échouée"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: "Invitation active déjà existante pour cet email et scope"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "An active invitation already exists for this email and scope"

  /data-sharing/invitations/accept:
    post:
      tags: [DataSharing]
      summary: "Accepter une invitation"
      description: >
        Accepte une invitation en fournissant le `invitationToken` reçu
        par email. Le service vérifie que l'adresse email de
        l'utilisateur connecté correspond à `partnerEmail` stockée en
        base (sécurité anti-interception). Le `status` passe à
        `"accepted"` et `partnerId` est renseigné.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RespondInvitationInput"
            example:
              invitationToken: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1"
      responses:
        "200":
          description: "Invitation acceptée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Invitation accepted"
                data:
                  share:
                    _id: "664a1b2c3d4e5f6a7b8c9d0e"
                    ownerId: "664a1b2c3d4e5f6a7b8c9d0f"
                    partnerId: "664a1b2c3d4e5f6a7b8c9d10"
                    partnerEmail: "partner@example.com"
                    scope: "menstrual_cycle"
                    status: "accepted"
                    emailSentSuccessfully: true
                    invitedAt: "2025-06-15T08:00:00.000Z"
                    respondedAt: "2025-06-16T08:00:00.000Z"
                    createdAt: "2025-06-15T08:00:00.000Z"
                    updatedAt: "2025-06-16T08:00:00.000Z"
        "400":
          description: "Invitation déjà traitée (status n'est plus pending)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "This invitation has already been accepted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Email de l'utilisateur connecté ne correspond pas à partnerEmail"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "This invitation was sent to a different email address"
        "404":
          description: "Token d'invitation introuvable"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Invitation not found"

  /data-sharing/invitations/decline:
    post:
      tags: [DataSharing]
      summary: "Décliner une invitation"
      description: >
        Décline une invitation. Mêmes contrôles que `/accept` :
        vérification du token, vérification de correspondance d'email,
        protection anti-rejeu (status doit être "pending"). Le `status`
        passe à `"declined"`.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RespondInvitationInput"
            example:
              invitationToken: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1"
      responses:
        "200":
          description: "Invitation déclinée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Invitation declined"
        "400":
          description: "Invitation déjà traitée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
