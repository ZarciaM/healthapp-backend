  /calories:
    get:
      tags: [Calories]
      summary: "Calculer les besoins caloriques quotidiens"
      description: >
        Calcule le métabolisme de base (BMR), la dépense énergétique
        totale (TDEE) et les calories recommandées selon l'objectif de
        l'utilisateur.

        **Query params — Règle du "tout ou rien" :**
        Les paramètres `weight` et `height` sont optionnels mais
        doivent être fournis **ensemble**. Si l'un est fourni sans
        l'autre, la requête est rejetée en 400. Aucun fallback
        silencieux n'est appliqué sur un override partiel.

        **Cascade de fallback pour weight / height :**
        1. **Override** — si `weight` et `height` sont fournis en query,
           ils sont utilisés (weightSource: `"override"`)
        2. **Dernière pesée (BmiEntry)** — sinon, le poids et la taille
           de la dernière entrée BmiEntry sont utilisés (weightSource:
           `"latest_entry"`)
        3. **Profil santé (HealthProfile)** — en dernier recours, les
           valeurs du profil santé sont utilisées (weightSource:
           `"health_profile"`)

        Si aucune de ces sources ne fournit les données nécessaires, la
        requête échoue en 400.

        **Conditions préalables :**
        - L'utilisateur doit avoir un `gender` et un `dateOfBirth`
          définis (sinon 400)
        - Le profil santé doit avoir `activityLevel` et `goal`
          renseignés (sinon 400 — onboarding incomplet)

        **Plancher de sécurité calorique :**
        Les calories recommandées ne descendent jamais sous un minimum
        vital : 1 200 kcal/j pour les femmes, 1 500 kcal/j pour les
        hommes. Le message de réponse l'indique explicitement si ce
        plancher a été appliqué.
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: weight
          required: false
          schema:
            type: number
            minimum: 20
            maximum: 300
          description: "Poids en kg (doit être accompagné de height)"
        - in: query
          name: height
          required: false
          schema:
            type: number
            minimum: 50
            maximum: 250
          description: "Taille en cm (doit être accompagnée de weight)"
      responses:
        "200":
          description: "Besoins caloriques calculés"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Besoins caloriques calculés"
                data:
                  result:
                    bmr: 1696
                    tdee: 2629
                    recommendedCalories: 1500
                    message: "Un déficit modéré de 500 kcal par jour est recommandé pour une perte de poids progressive et durable. Nous avons ajusté cette recommandation à un minimum sain. Consultez un professionnel de santé pour un suivi personnalisé."
                    sourceData:
                      weight: 75
                      height: 175
                      age: 35
                      gender: "male"
                      activityLevel: "moderate"
                      goal: "lose_weight"
                      weightSource: "latest_entry"
        "400":
          description: "Données manquantes ou onboarding incomplet"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                partialOverride:
                  summary: "Un seul des deux params override fourni"
                  value:
                    success: false
                    message: "Les paramètres weight et height doivent être fournis ensemble pour surcharger les valeurs du profil"
                incompleteProfile:
                  summary: "Genre ou date de naissance manquants"
                  value:
                    success: false
                    message: "Veuillez compléter votre profil (genre et date de naissance) avant de calculer vos besoins caloriques"
                incompleteOnboarding:
                  summary: "ActivityLevel ou goal manquants dans le profil santé"
                  value:
                    success: false
                    message: "Veuillez compléter le questionnaire santé (niveau d'activité et objectif) avant de calculer vos besoins caloriques"
                noHealthProfile:
                  summary: "Aucun profil santé trouvé"
                  value:
                    success: false
                    message: "Veuillez compléter votre profil de santé avant de calculer vos besoins"
                noWeightSource:
                  summary: "Aucune source de poids disponible"
                  value:
                    success: false
                    message: "Veuillez compléter votre profil de santé ou enregistrer une pesée avant de calculer vos besoins"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /water:
    get:
      tags: [Water]
      summary: "Calculer les besoins hydriques quotidiens"
      description: >
        Calcule les besoins en eau quotidiens (total en ml) à partir du
        poids, du niveau d'activité et du climat.

        **Query params :**
        - `weight` (optionnel) — surcharge le poids utilisé par le calcul
        - `climate` (optionnel, défaut: `"normal"`) — `"normal"` ou
          `"hot"` ; toute autre valeur est rejetée en 400

        **Cascade de fallback pour le poids :**
        1. **Override** — si `weight` est fourni en query, il est utilisé
           (weightSource: `"override"`)
        2. **Dernière pesée (BmiEntry)** — sinon, le poids de la dernière
           entrée BmiEntry est utilisé (weightSource: `"latest_entry"`)
        3. **Profil santé (HealthProfile)** — en dernier recours, la
           valeur `currentWeight` du profil santé est utilisée
           (weightSource: `"health_profile"`)

        **Plancher et plafond de sécurité :**
        - **Plancher** : le résultat ne descend jamais sous **1 500 ml**.
          Si le calcul brut est inférieur, il est remonté à 1 500 ml
          et le message l'indique.
        - **Plafond** : le résultat ne dépasse jamais **5 000 ml**.
          Si le calcul brut dépasse 5 000 ml, il est plafonné et le
          message recommande de consulter un professionnel de santé.
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: weight
          required: false
          schema:
            type: number
            minimum: 20
            maximum: 300
          description: "Poids en kg (optionnel, suit la cascade de fallback si omis)"
        - in: query
          name: climate
          required: false
          schema:
            type: string
            enum: [normal, hot]
            default: normal
          description: "Climat : 'normal' ou 'hot' (défaut: normal)"
      responses:
        "200":
          description: "Besoins hydriques calculés"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Besoins hydriques calculés"
                data:
                  result:
                    totalMl: 2625
                    breakdown:
                      base: 2625
                      activityBonus: 350
                      climateBonus: 0
                    message: "Cette recommandation correspond à vos besoins hydriques quotidiens estimés."
                    sourceData:
                      weight: 75
                      weightSource: "latest_entry"
                      activityLevel: "moderate"
                      climate: "normal"
        "400":
          description: "Paramètre invalide ou onboarding incomplet"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidClimate:
                  summary: "Climate hors enum"
                  value:
                    success: false
                    message: "Validation échouée"
                    details:
                      - code: "invalid_enum_value"
                        path: ["climate"]
                        message: "Valeur invalide. Valeurs attendues: 'normal' | 'hot'"
                incompleteOnboarding:
                  summary: "ActivityLevel manquant dans le profil santé"
                  value:
                    success: false
                    message: "Veuillez compléter le questionnaire santé (niveau d'activité) avant de calculer vos besoins hydriques"
                noHealthProfile:
                  summary: "Aucun profil santé trouvé"
                  value:
                    success: false
                    message: "Veuillez compléter votre profil de santé avant de calculer vos besoins"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /sleep:
    post:
      tags: [Sleep]
      summary: "Enregistrer une entrée de sommeil"
      description: >
        Crée une entrée de sommeil avec les horaires de coucher et de
        réveil ainsi qu'une note de qualité subjective.

        **IMPORTANT — Dates complètes requises :**
        `bedTime` et `wakeTime` doivent être des **dates ISO complètes**
        (jour + heure, ex: `"2025-06-15T23:00:00.000Z"`), pas seulement
        des heures. Cela permet de gérer correctement les nuits qui
        traversent minuit (coucher le 15 juin, réveil le 16 juin).

        **Contraintes temporelles :**
        - `wakeTime` doit être **strictement postérieur** à `bedTime`
          (sinon 400)
        - L'écart entre `wakeTime` et `bedTime` ne peut pas dépasser
          **24 heures** (sinon 400)
        - `bedTime` et `wakeTime` ne peuvent pas être dans le futur

        **Valeurs calculées à la création :**
        - `durationMinutes` : durée calculée en minutes (différence
          wakeTime - bedTime)
        - `feedback` : objet avec `message` et `isHealthyRange`
          (basé sur la fonction `getSleepDurationFeedback`)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSleepEntryInput"
            example:
              bedTime: "2025-06-15T23:00:00.000Z"
              wakeTime: "2025-06-16T07:30:00.000Z"
              quality: 4
      responses:
        "201":
          description: "Entrée de sommeil créée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Entrée de sommeil créée"
                data:
                  entry:
                    _id: "664a1b2c3d4e5f6a7b8c9d0e"
                    userId: "664a1b2c3d4e5f6a7b8c9d0f"
                    bedTime: "2025-06-15T23:00:00.000Z"
                    wakeTime: "2025-06-16T07:30:00.000Z"
                    durationMinutes: 510
                    quality: 4
                    recordedAt: "2025-06-16T07:30:00.000Z"
                    feedback:
                      message: "Votre durée de sommeil se situe dans la plage généralement recommandée pour un adulte. Continuez ainsi."
                      isHealthyRange: true
                    createdAt: "2025-06-16T07:30:00.000Z"
                    updatedAt: "2025-06-16T07:30:00.000Z"
        "400":
          description: "Données invalides (validation Zod)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                wakeBeforeBed:
                  summary: "Réveil avant coucher"
