  /heart-rate/averages:
    get:
      tags: [HeartRate]
      summary: "Moyennes de fréquence cardiaque sur une période"
      description: >
        Calcule la moyenne du BPM sur une période donnée via agrégation
        MongoDB. Le paramètre optionnel `context` permet de filtrer les
        mesures par contexte (`resting`, `after_exercise`, `other`).

        **IMPORTANT — Filtrage par contexte :**
        Sans filtre `context`, les mesures de différents contextes
        (repos, post-exercice, autre) sont mélangées dans la moyenne,
        ce qui peut donner un résultat peu représentatif. Le frontend
        **doit** filtrer explicitement par `context` pour obtenir des
        moyennes cohérentes (ex: moyenne au repos uniquement).

        Si aucune donnée n'existe sur la période, `entriesCount` est 0
        et `averageBpm` est à 0 (pas de NaN). Paramètres : `days`
        (défaut: 7, max: 365), `context` (optionnel).
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: days
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 7
          description: "Nombre de jours (1-365, entier positif)"
        - in: query
          name: context
          required: false
          schema:
            type: string
            enum: [resting, after_exercise, other]
          description: "Filtrer par contexte (optionnel). Sans filtre, tous les contextes sont mélangés."
      responses:
        "200":
          description: "Moyennes de fréquence cardiaque"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              examples:
                withData:
                  summary: "Données trouvées sur la période"
                  value:
                    success: true
                    message: "Moyennes de fréquence cardiaque"
                    data:
                      averages:
                        averageBpm: 68.5
                        entriesCount: 25
                        message: "Moyenne calculée sur 25 mesures (7 derniers jours)"
                noData:
                  summary: "Aucune donnée sur la période"
                  value:
                    success: true
                    message: "Moyennes de fréquence cardiaque"
                    data:
                      averages:
                        averageBpm: 0
                        entriesCount: 0
                        message: "Aucune donnée de fréquence cardiaque enregistrée sur cette période"
        "400":
          description: "Paramètre days invalide (non entier, < 1, > 365)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /heart-rate/{id}:
    delete:
      tags: [HeartRate]
      summary: "Supprimer une mesure de fréquence cardiaque"
      description: >
        Supprime une entrée de fréquence cardiaque. Le middleware
        `validateObjectId` vérifie que l'ID est un ObjectId MongoDB
        valide (sinon 400). La suppression est protégée contre les
        attaques IDOR : le service vérifie que l'entrée appartient
        bien à l'utilisateur connecté (sinon 403). Si l'ObjectId est
        valide mais l'entrée introuvable, une erreur 404 est retournée.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{24}$"
          description: "ObjectId MongoDB de l'entrée de fréquence cardiaque"
      responses:
        "200":
          description: "Entrée supprimée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Entrée de fréquence cardiaque supprimée"
        "400":
          description: "ID malformé (ObjectId invalide)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "ID d'entrée de fréquence cardiaque invalide"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Tentative de suppression d'une entrée ne vous appartenant pas (IDOR)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Vous ne pouvez pas supprimer une entrée qui ne vous appartient pas"
        "404":
          description: "Entrée introuvable"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Entrée de fréquence cardiaque introuvable"

  /body-fat:
    post:
      tags: [BodyFat]
      summary: "Enregistrer une mesure de graisse corporelle"
      description: >
        Calcule et enregistre le pourcentage de graisse corporelle à
        partir des mesures anthropométriques via la méthode US Navy.

        **Formule utilisée :**
        Méthode **US Navy** (Hodgdon & Beckett, 1984, Naval Health
        Research Center). Les mesures sont saisies en centimètres mais
        converties en pouces en interne (÷ 2.54) pour appliquer la
        formule originale :

        - **Homme** : BF% = 86.010 × log10(waist - neck)
          - 70.041 × log10(height) + 36.76
        - **Femme** : BF% = 163.205 × log10(waist + hip - neck)
          - 97.684 × log10(height) - 78.387

        **Champs requis :**
        - `neckCm` : tour de cou (20-60 cm)
        - `waistCm` : tour de taille (40-200 cm). Doit être strictement
          supérieur à `neckCm` (sinon log10 invalide → 400)
        - `heightCm` : taille (50-250 cm)

        **Champ conditionnel — hipCm :**
        - `hipCm` (40-200 cm) est optionnel au niveau du schéma de
          validation mais devient **obligatoire au niveau service**
          si l'utilisateur est `gender: female`. Une requête POST
          sans `hipCm` pour une femme retourne 400 : "La mesure des
          hanches est requise pour ce calcul."
        - Pour un **homme**, si `hipCm` est tout de même fourni, il
          est simplement **ignoré** dans le calcul (pas d'erreur).

        **Résultat :**
        - `bodyFatPercent` : pourcentage calculé (arrondi à 1 décimale)
        - `category` : catégorie déterminée par `getBodyFatCategory`
          (essentiel, athletique, fitness, moyen, au_dessus_de_la_moyenne)

        **Note :** Pas de route `/averages` pour ce module — moyenner
        un pourcentage de graisse corporelle sur plusieurs mesures
        manuelles a moins de pertinence statistique.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBodyFatEntryInput"
            examples:
              male:
                summary: "Homme (sans hipCm)"
                value:
                  neckCm: 38
                  waistCm: 85
                  heightCm: 175
              female:
                summary: "Femme (avec hipCm obligatoire)"
                value:
                  neckCm: 33
                  waistCm: 72
                  hipCm: 95
                  heightCm: 165
      responses:
        "201":
          description: "Mesure de graisse corporelle enregistrée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Mesure de graisse corporelle enregistrée"
                data:
                  entry:
                    _id: "664a1b2c3d4e5f6a7b8c9d0e"
                    userId: "664a1b2c3d4e5f6a7b8c9d0f"
                    neckCm: 38
                    waistCm: 85
                    hipCm: null
                    heightCm: 175
                    bodyFatPercent: 18.5
                    category: "fitness"
                    recordedAt: "2025-06-15T08:00:00.000Z"
                    createdAt: "2025-06-15T08:00:00.000Z"
                    updatedAt: "2025-06-15T08:00:00.000Z"
        "400":
          description: "Données invalides ou incohérentes"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                waistLessThanNeck:
                  summary: "Tour de taille inférieur au tour de cou"
                  value:
                    success: false
                    message: "Validation échouée"
                    details:
                      - code: "custom"
                        path: ["waistCm"]
                        message: "Le tour de taille doit être supérieur au tour de cou pour effectuer le calcul de la graisse corporelle."
                missingHipForFemale:
                  summary: "Hanche manquante pour une femme"
                  value:
                    success: false
                    message: "La mesure des hanches est requise pour ce calcul."
                missingGender:
                  summary: "Genre non défini sur le profil"
                  value:
                    success: false
                    message: "Genre manquant dans votre profil. Veuillez renseigner votre genre."
        "401":
          $ref: "#/components/responses/Unauthorized"

