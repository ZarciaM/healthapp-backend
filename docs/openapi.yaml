      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: "Nombre d'entrées (doit être un entier positif)"
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date-time
          description: "Borne inférieure (incluse) sur recordedAt"
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date-time
          description: "Borne supérieure (incluse) sur recordedAt"
      responses:
        "200":
          description: "Historique récupéré"
