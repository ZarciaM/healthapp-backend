  ############################################################################
  # MEDICATION
  ############################################################################

  /medication:
    post:
      tags: [Medication]
      summary: "Créer un rappel de médicament"
      description: >
        Crée un rappel de prise de médicament.

        **Déclenchement interne (hors API) :**
        La fonction `findDueReminders` dans le service n'est PAS une
        route API exposée. Elle est invoquée exclusivement par le
        scheduler `node-cron` (tâche planifiée toutes les minutes).
        Le déclenchement réel des notifications dépend du **fuseau
        horaire** de l'utilisateur (champ `timezone` stocké sur le
        profil User), pas de l'heure du serveur. Le scheduler convertit
        l'heure UTC courante vers chaque fuseau utilisateur distinct et
        ne déclenche le rappel que si l'heure locale correspond à un
        des `times` programmés.

        **Limitations :** Voir la route GET /push-subscriptions/vapid-public-key pour
        l'état du système de notifications push.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicationReminderInput"
            example:
              medicationName: "Doliprane"
              dosage: "1000mg"
              times: ["08:00", "20:00"]
              startDate: "2025-06-15"
              endDate: "2025-07-15"
              notifyByEmail: true
              notifyByPush: true
      responses:
        "201":
          description: "Rappel créé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Medication reminder created"
                data:
                  reminder:
                    _id: "664a1b2c3d4e5f6a7b8c9d0e"
                    userId: "664a1b2c3d4e5f6a7b8c9d0f"
                    medicationName: "Doliprane"
                    dosage: "1000mg"
                    times: ["08:00", "20:00"]
                    startDate: "2025-06-15T00:00:00.000Z"
                    endDate: "2025-07-15T00:00:00.000Z"
                    isActive: true
                    notifyByEmail: true
                    notifyByPush: true
                    createdAt: "2025-06-15T08:00:00.000Z"
                    updatedAt: "2025-06-15T08:00:00.000Z"
        "400":
          description: "Données invalides"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Validation échouée"
        "401":
          $ref: "#/components/responses/Unauthorized"

    get:
      tags: [Medication]
      summary: "Lister les rappels de médicaments"
      description: >
        Retourne la liste des rappels de médicaments de l'utilisateur
        connecté, triée par date de création décroissante.
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: activeOnly
          required: false
          schema:
            type: string
            enum: ["true"]
          description: "Si présent et égal à 'true', ne retourne que les rappels actifs (isActive: true)"
      responses:
        "200":
          description: "Liste des rappels"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Medication reminders retrieved"
                data:
                  reminders:
                    - _id: "664a1b2c3d4e5f6a7b8c9d0e"
                      userId: "664a1b2c3d4e5f6a7b8c9d0f"
                      medicationName: "Doliprane"
                      dosage: "1000mg"
                      times: ["08:00", "20:00"]
                      startDate: "2025-06-15T00:00:00.000Z"
                      endDate: "2025-07-15T00:00:00.000Z"
                      isActive: true
                      notifyByEmail: true
                      notifyByPush: true
                      createdAt: "2025-06-15T08:00:00.000Z"
                      updatedAt: "2025-06-15T08:00:00.000Z"
                    - _id: "664a1b2c3d4e5f6a7b8c9d10"
                      userId: "664a1b2c3d4e5f6a7b8c9d0f"
                      medicationName: "Vitamine D"
                      dosage: null
                      times: ["09:00"]
                      startDate: "2025-05-01T00:00:00.000Z"
                      endDate: null
                      isActive: false
                      notifyByEmail: true
                      notifyByPush: false
                      createdAt: "2025-05-01T08:00:00.000Z"
                      updatedAt: "2025-06-10T08:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /medication/{id}:
    patch:
      tags: [Medication]
      summary: "Modifier un rappel de médicament"
      description: >
        Met à jour un rappel existant. Tous les champs sont optionnels
        (remplacement partiel). **Protection IDOR** : seuls le
        propriétaire du rappel peut le modifier.

        **Gestion de endDate :**
        - Si `endDate` est omis, la valeur existante est conservée.
        - Si `endDate` est explicitement `null`, le champ est supprimé
          ($unset) — le rappel n'a alors plus de date de fin.
        - Si `endDate` est une date, elle doit être postérieure à
          `startDate` (valeur fournie ou existante).
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{24}$"
          description: "ObjectId du rappel à modifier"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMedicationReminderInput"
            example:
              dosage: "500mg"
              notifyByEmail: false
      responses:
        "200":
          description: "Rappel modifié"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Medication reminder updated"
                data:
                  reminder:
                    _id: "664a1b2c3d4e5f6a7b8c9d0e"
                    userId: "664a1b2c3d4e5f6a7b8c9d0f"
                    medicationName: "Doliprane"
                    dosage: "500mg"
                    times: ["08:00", "20:00"]
                    startDate: "2025-06-15T00:00:00.000Z"
                    endDate: "2025-07-15T00:00:00.000Z"
                    isActive: true
                    notifyByEmail: false
                    notifyByPush: true
                    createdAt: "2025-06-15T08:00:00.000Z"
                    updatedAt: "2025-06-16T08:00:00.000Z"
        "400":
          description: "Données invalides"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "endDate must be after startDate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Tentative de modification d'un rappel ne vous appartenant pas (IDOR)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "You cannot update a reminder that does not belong to you"
        "404":
          description: "Rappel introuvable"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Reminder not found"

  /medication/{id}/deactivate:
    patch:
      tags: [Medication]
      summary: "Désactiver un rappel"
      description: >
        Passe `isActive` à `false` sans supprimer le document.
        L'historique du traitement est conservé. **Protection IDOR**
        : seuls le propriétaire du rappel peut le désactiver.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{24}$"
          description: "ObjectId du rappel à désactiver"
      responses:
        "200":
          description: "Rappel désactivé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Medication reminder deactivated"
                data: {}
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Tentative de désactivation d'un rappel ne vous appartenant pas (IDOR)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "You cannot deactivate a reminder that does not belong to you"
        "404":
          description: "Rappel introuvable"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Reminder not found"

    delete:
      tags: [Medication]
      summary: "Supprimer un rappel"
      description: >
        Supprime définitivement le rappel de la base de données.
        **Protection IDOR** : seuls le propriétaire du rappel peut le
        supprimer.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{24}$"
          description: "ObjectId du rappel à supprimer"
      responses:
        "200":
          description: "Rappel supprimé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Medication reminder deleted"
                data: {}
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Tentative de suppression d'un rappel ne vous appartenant pas (IDOR)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "You cannot delete a reminder that does not belong to you"
        "404":
          description: "Rappel introuvable"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Reminder not found"

  ############################################################################
  # PUSH SUBSCRIPTIONS
  ############################################################################

  /push-subscriptions/vapid-public-key:
    get:
      tags: [PushSubscriptions]
      summary: "Obtenir la clé publique VAPID"
      description: >
        Route **publique** (sans authentification) qui retourne la
        clé publique VAPID nécessaire à l'abonnement push côté
        navigateur. Le frontend doit appeler cette route avant
        d'initialiser `registration.pushManager.subscribe()`.

        **État actuel :** Ce système de notifications push n'a pas
        encore été testé en conditions réelles avec un vrai navigateur
        abonné — le frontend n'existe pas encore. Seule la logique
        serveur a été validée unitairement.
      responses:
        "200":
          description: "Clé publique VAPID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "VAPID public key"
                data:
                  publicKey: "BEl62iUYgUivxIkv69yVEl62iUYgUivxIkv69yVEl62iUYgUivxIkv69yVEl62iUYgUivxIkv69yVEl62iUYgUivxIkv69yV"

  /push-subscriptions:
    post:
      tags: [PushSubscriptions]
      summary: "S'abonner aux notifications push"
      description: >
        Enregistre ou met à jour (upsert basé sur `endpoint`) un
        abonnement push pour l'utilisateur connecté. Les champs
        `endpoint`, `keys.p256dh` et `keys.auth` sont requis (ils
        sont fournis par l'API Push du navigateur).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePushSubscriptionInput"
            example:
              endpoint: "https://fcm.googleapis.com/fcm/send/..."
              keys:
                p256dh: "BCi1l6pY..."
                auth: "aGVsbG8..."
      responses:
        "201":
          description: "Abonnement enregistré"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Push subscription registered"
                data:
                  subscription:
                    _id: "664a1b2c3d4e5f6a7b8c9d0e"
                    userId: "664a1b2c3d4e5f6a7b8c9d0f"
                    endpoint: "https://fcm.googleapis.com/fcm/send/..."
                    keys:
                      p256dh: "BCi1l6pY..."
                      auth: "aGVsbG8..."
                    createdAt: "2025-06-15T08:00:00.000Z"
                    updatedAt: "2025-06-15T08:00:00.000Z"
        "400":
          description: "Données manquantes"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "endpoint, keys.p256dh and keys.auth are required"
        "401":
          $ref: "#/components/responses/Unauthorized"

    delete:
      tags: [PushSubscriptions]
      summary: "Se désabonner des notifications push"
      description: >
        Supprime l'abonnement push de l'utilisateur connecté.
        Le champ `endpoint` dans le body est optionnel — s'il est
        fourni, seul cet abonnement est supprimé ; sinon, **tous**
        les abonnements de l'utilisateur sont supprimés.
      security:
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                endpoint:
                  type: string
                  description: "Endpoint à supprimer (optionnel — supprime tous les abonnements si omis)"
                  example: "https://fcm.googleapis.com/fcm/send/..."
      responses:
        "200":
          description: "Désabonnement effectué"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Push subscription removed"
                data: {}
        "401":
          $ref: "#/components/responses/Unauthorized"

  ############################################################################
  # HYDRATION
  ############################################################################

  /hydration:
    post:
      tags: [Hydration]
      summary: "Créer ou mettre à jour la configuration d'hydratation"
      description: >
        Crée ou met à jour (upsert) la configuration de rappels
        d'hydratation de l'utilisateur connecté. Il n'existe qu'**UNE
        SEULE** configuration active par utilisateur (pas d'historique
        de plusieurs configs, contrairement au module Medication qui
        peut avoir plusieurs traitements en parallèle).

        **Modes :**
        - `"fixed_times"` : l'utilisateur fournit un tableau `times`
          (`["08:00", "12:00", "18:00"]`). `intervalConfig` ne doit
          **pas** être fourni.
        - `"interval"` : l'utilisateur fournit `intervalConfig`
          (`{ startTime, endTime, intervalHours }`). Le tableau
          `times` final est **généré automatiquement** par le serveur
          via `generateIntervalTimes()` et stocké en base. Le frontend
          n'a jamais besoin de le calculer lui-même. Le champ `times`
          ne doit **pas** être fourni directement dans ce mode.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHydrationReminderInput"
            examples:
              fixed_times:
                summary: "Mode heures fixes"
                value:
                  mode: "fixed_times"
                  times: ["08:00", "12:00", "18:00"]
                  notifyByEmail: true
                  notifyByPush: true
              interval:
                summary: "Mode intervalle"
                value:
                  mode: "interval"
                  intervalConfig:
                    startTime: "08:00"
                    endTime: "20:00"
                    intervalHours: 2
                  notifyByEmail: true
                  notifyByPush: false
      responses:
        "200":
          description: "Configuration enregistrée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Hydration reminder saved"
                data:
                  reminder:
                    _id: "664a1b2c3d4e5f6a7b8c9d0e"
                    userId: "664a1b2c3d4e5f6a7b8c9d0f"
                    mode: "fixed_times"
                    times: ["08:00", "12:00", "18:00"]
                    isActive: true
                    notifyByEmail: true
                    notifyByPush: true
                    createdAt: "2025-06-15T08:00:00.000Z"
                    updatedAt: "2025-06-15T08:00:00.000Z"
        "400":
          description: "Données invalides"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingTimes:
                  summary: "times manquant en mode fixed_times"
                  value:
                    success: false
                    message: "Validation échouée"
                    details:
                      - code: "custom"
                        path: ["times"]
                        message: "times is required when mode is 'fixed_times' and must contain at least one time"
                intervalConfigProvidedWithFixed:
                  summary: "intervalConfig fourni en mode fixed_times"
                  value:
                    success: false
                    message: "Validation échouée"
                    details:
                      - code: "custom"
                        path: ["intervalConfig"]
                        message: "intervalConfig must not be provided when mode is 'fixed_times'"
                missingIntervalConfig:
                  summary: "intervalConfig manquant en mode interval"
                  value:
                    success: false
                    message: "Validation échouée"
                    details:
                      - code: "custom"
                        path: ["intervalConfig"]
                        message: "intervalConfig is required when mode is 'interval'"
        "401":
          $ref: "#/components/responses/Unauthorized"

    get:
      tags: [Hydration]
      summary: "Récupérer la configuration d'hydratation"
      description: >
        Retourne la configuration de rappels d'hydratation de
        l'utilisateur connecté. **La réponse peut être
        `{ data: { reminder: null } }` si l'utilisateur n'a jamais
        configuré de rappel d'hydratation** — ce n'est PAS une
        erreur 404.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: "Configuration d'hydratation (peut être null)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              examples:
                found:
                  summary: "Configuration existante"
                  value:
                    success: true
                    message: "Hydration reminder retrieved"
                    data:
                      reminder:
                        _id: "664a1b2c3d4e5f6a7b8c9d0e"
                        userId: "664a1b2c3d4e5f6a7b8c9d0f"
                        mode: "interval"
                        times: ["08:00", "10:00", "12:00", "14:00", "16:00", "18:00", "20:00"]
                        intervalConfig:
                          startTime: "08:00"
                          endTime: "20:00"
                          intervalHours: 2
                        isActive: true
                        notifyByEmail: true
                        notifyByPush: false
                        createdAt: "2025-06-15T08:00:00.000Z"
                        updatedAt: "2025-06-15T08:00:00.000Z"
                notFound:
                  summary: "Jamais configuré"
                  value:
                    success: true
                    message: "Hydration reminder retrieved"
                    data:
                      reminder: null
        "401":
          $ref: "#/components/responses/Unauthorized"

    delete:
      tags: [Hydration]
      summary: "Supprimer la configuration d'hydratation"
      description: >
        Supprime définitivement la configuration de rappels
        d'hydratation. Retourne 404 si l'utilisateur n'a pas encore
        de configuration.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: "Configuration supprimée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Hydration reminder deleted"
                data: {}
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: "Aucune configuration trouvée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "No hydration reminder found for this user"

  /hydration/deactivate:
    patch:
      tags: [Hydration]
      summary: "Désactiver les rappels d'hydratation"
      description: >
        Passe `isActive` à `false` sans supprimer la configuration.
        La configuration peut être réactivée ultérieurement
        (PATCH /hydration/reactivate). Retourne 404 si l'utilisateur
        n'a pas encore de configuration.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: "Rappels désactivés"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Hydration reminder deactivated"
                data: {}
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: "Aucune configuration trouvée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "No hydration reminder found for this user"

  /hydration/reactivate:
    patch:
      tags: [Hydration]
      summary: "Réactiver les rappels d'hydratation"
      description: >
        Passe `isActive` à `true`. Retourne la configuration réactivée.
        Retourne 404 si l'utilisateur n'a pas encore de configuration.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: "Rappels réactivés"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Hydration reminder reactivated"
                data:
                  reminder:
                    _id: "664a1b2c3d4e5f6a7b8c9d0e"
                    userId: "664a1b2c3d4e5f6a7b8c9d0f"
                    mode: "fixed_times"
                    times: ["08:00", "12:00", "18:00"]
                    isActive: true
                    notifyByEmail: true
                    notifyByPush: true
                    createdAt: "2025-06-15T08:00:00.000Z"
                    updatedAt: "2025-06-16T08:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: "Aucune configuration trouvée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "No hydration reminder found for this user"

components:

  schemas:
    User:
      type: object
      description: "Utilisateur (champ password et refreshTokens exclus du JSON)"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        email:
          type: string
          format: email
          example: "user@example.com"
        firstName:
          type: string
          example: "Jean"
        lastName:
          type: string
          example: "Dupont"
        gender:
          type: string
          enum: [male, female]
          nullable: true
          example: "male"
        dateOfBirth:
          type: string
          format: date-time
          nullable: true
          example: "1990-05-15T00:00:00.000Z"
        authProvider:
          type: string
          enum: [local, google]
          example: "local"
        googleId:
          type: string
          nullable: true
          example: "1234567890"
        tokenVersion:
          type: integer
          default: 0
          example: 2
        timezone:
          type: string
          default: "UTC"
          example: "Europe/Paris"
        isEmailVerified:
          type: boolean
          default: false
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
          example: true
        message:
          type: string
          example: "Opération réussie"
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [false]
          example: false
        message:
          type: string
          example: "Une erreur est survenue"
        details:
          type: array
          description: "Détails additionnels (présent uniquement sur les erreurs de validation)"
          items:
            type: object

    HealthProfile:
      type: object
      description: "Profil santé complet de l'utilisateur (wizard onboarding multi-étapes)"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        userId:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0f"
        height:
          type: number
          nullable: true
          description: "Taille en cm (étape 1)"
          example: 175
        currentWeight:
          type: number
          nullable: true
          description: "Poids actuel en kg (étape 1)"
          example: 75
        activityLevel:
          type: string
          nullable: true
          enum: [sedentary, light, moderate, active, very_active]
          description: "Niveau d'activité (étape 2)"
          example: "moderate"
        goal:
          type: string
          nullable: true
          enum: [lose_weight, gain_weight, maintain, general_health]
          description: "Objectif santé (étape 2)"
          example: "maintain"
        medicalHistory:
          type: object
          description: "Antécédents médicaux (étape 3)"
          properties:
            hypertension:
              type: boolean
              default: false
            diabetes:
              type: boolean
              default: false
            allergies:
              type: array
              items:
                type: string
              default: []
            currentMedications:
              type: array
              items:
                type: string
              default: []
        lifestyle:
          type: object
          nullable: true
          description: "Style de vie (étape 4)"
          properties:
            averageSleepHours:
              type: number
              example: 7
            smoker:
              type: boolean
              example: false
            alcoholConsumption:
              type: string
              enum: [none, occasional, regular]
              example: "occasional"
        womenSpecific:
          type: object
          nullable: true
          description: "Informations spécifiques aux femmes (étape 5, uniquement si gender: female)"
          properties:
            cycleRegularity:
              type: string
              enum: [regular, irregular]
              example: "regular"
            lastPeriodDate:
              type: string
              format: date-time
              nullable: true
              example: "2025-06-15T00:00:00.000Z"
            averageCycleLength:
              type: number
              example: 28
        onboardingStep:
          type: integer
          description: "Étape actuelle du wizard (0 = pas commencé)"
          default: 0
          example: 4
        isCompleted:
          type: boolean
          description: "Toutes les étapes obligatoires (1-4) sont-elles complétées ?"
          default: false
          example: true
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: "Date à laquelle le profil a été marqué comme complété"
          example: "2025-06-15T10:00:00.000Z"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OnboardingStatus:
      type: object
      description: "Statut d'avancement du wizard onboarding"
      properties:
        isCompleted:
          type: boolean
          example: false
        currentStep:
          type: integer
          description: "Dernière étape complétée (0 = aucune)"
          example: 2
        totalSteps:
          type: integer
          description: "Nombre total d'étapes (4 pour un homme, 5 pour une femme)"
          example: 5

    Step1Input:
      type: object
      description: "Étape 1 — Mesures de base (taille et poids)"
      required: [height, currentWeight]
      properties:
        height:
          type: number
          minimum: 50
          maximum: 250
          description: "Taille en cm"
          example: 175
        currentWeight:
          type: number
          minimum: 20
          maximum: 300
          description: "Poids en kg"
          example: 75

    Step2Input:
      type: object
      description: "Étape 2 — Activité physique et objectif"
      required: [activityLevel, goal]
      properties:
        activityLevel:
          type: string
          enum: [sedentary, light, moderate, active, very_active]
          description: "Niveau d'activité quotidienne"
          example: "moderate"
        goal:
          type: string
          enum: [lose_weight, gain_weight, maintain, general_health]
          description: "Objectif principal"
          example: "maintain"

    Step3Input:
      type: object
      description: "Étape 3 — Antécédents médicaux"
      required: [medicalHistory]
      properties:
        medicalHistory:
          type: object
          required: [hypertension, diabetes, allergies, currentMedications]
          properties:
            hypertension:
              type: boolean
              example: false
            diabetes:
              type: boolean
              example: false
            allergies:
              type: array
              items:
                type: string
              maxItems: 20
              example: ["pollen"]
            currentMedications:
              type: array
              items:
                type: string
              maxItems: 20
              example: ["Vitamine D"]

    Step4Input:
      type: object
      description: "Étape 4 — Style de vie"
      required: [lifestyle]
      properties:
        lifestyle:
          type: object
          required: [averageSleepHours, smoker, alcoholConsumption]
          properties:
            averageSleepHours:
              type: number
              minimum: 0
              maximum: 24
              description: "Heures de sommeil moyennes par nuit"
              example: 7
            smoker:
              type: boolean
              example: false
            alcoholConsumption:
              type: string
              enum: [none, occasional, regular]
              example: "occasional"

    Step5WomenInput:
      type: object
      description: "Étape 5 — Spécifique femme (uniquement si gender: female)"
      required: [womenSpecific]
      properties:
        womenSpecific:
          type: object
          required: [cycleRegularity, lastPeriodDate, averageCycleLength]
          properties:
            cycleRegularity:
              type: string
              enum: [regular, irregular]
              description: "Régularité du cycle menstruel"
              example: "regular"
            lastPeriodDate:
              type: string
              format: date
              description: "Date des dernières règles (ne peut pas être dans le futur)"
              example: "2025-06-15"
            averageCycleLength:
              type: number
              minimum: 15
              maximum: 45
              description: "Durée moyenne du cycle en jours"
              example: 28

    BmiEntry:
      type: object
      description: "Entrée IMC (stockée dans la collection BmiEntry, partagée entre les modules BMI et Weight)"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        userId:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0f"
        weight:
          type: number
          description: "Poids en kg"
          example: 75
        height:
          type: number
          description: "Taille en cm"
          example: 175
        bmiValue:
          type: number
          description: "Valeur IMC calculée (arrondie à 1 décimale)"
          example: 24.5
        category:
          type: string
          enum: [insuffisance_ponderale, poids_normal, surpoids, obesite]
          description: "Catégorie IMC déterminée par getBMICategory"
          example: "poids_normal"
        recordedAt:
          type: string
          format: date-time
          description: "Date de la mesure (peut différer de createdAt si fournie par le client)"
          example: "2025-06-15T08:00:00.000Z"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateBmiEntryInput:
      type: object
      description: "Payload pour la création d'une entrée IMC (réutilisé par Weight)"
      required: [weight, height]
      properties:
        weight:
          type: number
          minimum: 20
          maximum: 300
          description: "Poids en kg"
          example: 75
        height:
          type: number
          minimum: 50
          maximum: 250
          description: "Taille en cm"
          example: 175
        recordedAt:
          type: string
          format: date-time
          description: "Date de la mesure (optionnelle, défaut: Date.now). Ne peut pas être dans le futur."
          example: "2025-06-15T08:00:00.000Z"

    WeightGoal:
      type: object
      description: "Objectif de poids (collection WeightGoal, un document unique par utilisateur via upsert)"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        userId:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0f"
        targetWeight:
          type: number
          description: "Poids cible en kg"
          example: 70
        targetDate:
          type: string
          format: date-time
          nullable: true
          description: "Date cible optionnelle (doit être dans le futur si fournie)"
          example: "2025-12-31T00:00:00.000Z"
        startingWeight:
          type: number
          description: "Poids de départ (initialisé à la dernière pesée lors de la création)"
          example: 75
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SetWeightGoalInput:
      type: object
      description: "Payload pour créer/mettre à jour un objectif de poids"
      required: [targetWeight]
      properties:
        targetWeight:
          type: number
          minimum: 20
          maximum: 300
          description: "Poids cible en kg"
          example: 70
        targetDate:
          type: string
          format: date-time
          description: "Date cible optionnelle (doit être dans le futur si fournie)"
          example: "2025-12-31T00:00:00.000Z"

    WeightProgress:
      type: object
      description: "Progression vers l'objectif de poids (contenu dans data.progress)"
      properties:
        goal:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/WeightGoal"
          description: "Objectif de poids ou null si aucun n'est défini"
        currentWeight:
          type: number
          nullable: true
          description: "Dernier poids enregistré ou null si aucune pesée"
          example: 73
        startingWeight:
          type: number
          nullable: true
          description: "Poids de départ au moment de la définition de l'objectif"
          example: 75
        weightChange:
          type: number
          nullable: true
          description: "Différence currentWeight - startingWeight (négatif = perte, positif = gain)"
          example: -2
        percentToGoal:
          type: number
          nullable: true
          description: "Pourcentage de progression vers l'objectif (0-100, null si non calculable)"
          example: 40
        message:
          type: string
          description: "Message factuel sur la progression (neutre même si l'évolution va dans le sens inverse de l'objectif)"
          example: "Vous avez perdu 2.0 kg sur les 5.0 kg visés (40% de votre objectif)."

    CaloriesCalculation:
      type: object
      description: "Résultat du calcul des besoins caloriques (contenu dans data.result)"
      properties:
        bmr:
          type: number
          description: "Métabolisme de base (Mifflin-St Jeor)"
          example: 1696
        tdee:
          type: number
          description: "Dépense énergétique totale (BMR × multiplicateur d'activité)"
          example: 2629
        recommendedCalories:
          type: number
          description: "Calories recommandées ajustées selon l'objectif (avec plancher de sécurité 1200/1500 kcal)"
          example: 1500
        message:
          type: string
          description: "Message explicatif sur les recommandations (contient la mention du plancher si appliqué)"
          example: "Un déficit modéré de 500 kcal par jour est recommandé pour une perte de poids progressive et durable."
        sourceData:
          type: object
          description: "Données sources utilisées pour le calcul"
          required: [weight, height, age, gender, activityLevel, goal, weightSource]
          properties:
            weight:
              type: number
              example: 75
            height:
              type: number
              example: 175
            age:
              type: integer
              example: 35
            gender:
              type: string
              enum: [male, female]
              example: "male"
            activityLevel:
              type: string
              enum: [sedentary, light, moderate, active, very_active]
              example: "moderate"
            goal:
              type: string
              enum: [lose_weight, gain_weight, maintain, general_health]
              example: "lose_weight"
            weightSource:
              type: string
              enum: [override, latest_entry, health_profile]
              description: "Source ayant fourni le poids utilisé par le calcul"
              example: "latest_entry"

    WaterCalculation:
      type: object
      description: "Résultat du calcul des besoins hydriques (contenu dans data.result)"
      properties:
        totalMl:
          type: number
          description: "Besoins hydriques totaux en ml (plafonné à 5000, plancher à 1500)"
          example: 2625
        breakdown:
          type: object
          description: "Détail des composantes du calcul"
          required: [base, activityBonus, climateBonus]
          properties:
            base:
              type: number
              description: "Base calculée à partir du poids (35 ml × kg)"
              example: 2625
            activityBonus:
              type: number
              description: "Bonus activité physique (0-900 ml selon le niveau)"
              example: 350
            climateBonus:
              type: number
              description: "Bonus climatique (500 ml si 'hot', sinon 0)"
              example: 0
        message:
          type: string
          description: "Message explicatif (contient la mention du plancher/plafond si appliqué)"
          example: "Cette recommandation correspond à vos besoins hydriques quotidiens estimés."
        sourceData:
          type: object
          description: "Données sources utilisées pour le calcul"
          required: [weight, weightSource, activityLevel, climate]
          properties:
            weight:
              type: number
              example: 75
            weightSource:
              type: string
              enum: [override, latest_entry, health_profile]
              description: "Source ayant fourni le poids"
              example: "latest_entry"
            activityLevel:
              type: string
              enum: [sedentary, light, moderate, active, very_active]
              example: "moderate"
            climate:
              type: string
              enum: [normal, hot]
              example: "normal"

    SleepEntry:
      type: object
      description: "Entrée de sommeil"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        userId:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0f"
        bedTime:
          type: string
          format: date-time
          description: "Date et heure du coucher (date ISO complète, pas seulement l'heure)"
