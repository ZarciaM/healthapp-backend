                    userId: "664a1b2c3d4e5f6a7b8c9d0f"
                    bpm: 72
                    category: "normal"
                    context: "resting"
                    message: "Votre pouls est dans les valeurs normales au repos."
                    recordedAt: "2025-06-15T08:00:00.000Z"
                    createdAt: "2025-06-15T08:00:00.000Z"
                    updatedAt: "2025-06-15T08:00:00.000Z"
        "400":
          description: "Données invalides (validation Zod)"
