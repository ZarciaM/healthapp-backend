          type: string
          format: date
          description: "Date de conception (YYYY-MM-DD). Requise si calculationMethod='conception'. Ne doit pas être fournie si calculationMethod='lmp'. ≤ aujourd'hui, ≤ 287 jours dans le passé."
          example: null

    PregnancyGestationalAge:
      type: object
      description: "Âge gestationnel calculé"
      properties:
        weeks:
          type: integer
          example: 15
        days:
          type: integer
          example: 2
        trimester:
          type: integer
          enum: [1, 2, 3]
          example: 2
        anomaly:
          type: string
          nullable: true
          enum: [post_term, pre_conception]
          description: "Anomalie éventuelle (null si normal, post_term si terme dépassé, pre_conception si avant conception)"
          example: null

    PregnancyMilestone:
      type: object
      description: "Jalon de grossesse pour une semaine donnée"
      properties:
        weekNumber:
          type: integer
          minimum: 1
          maximum: 40
          example: 15
        title:
          type: string
          example: "Semaine 15"
        description:
          type: string
          example: "Bébé bouge et entend votre voix."
        icon:
          type: string
          example: "🤰"

    PregnancyProgress:
      type: object
      description: "Progression détaillée de la grossesse (contenu dans data)"
      properties:
        pregnancy:
          $ref: "#/components/schemas/PregnancyProfile"
        gestationalAge:
          $ref: "#/components/schemas/PregnancyGestationalAge"
        daysUntilDueDate:
          type: integer
          description: "Jours avant la DDR (peut être négatif si terme dépassé)"
          example: 174
        currentMilestone:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PregnancyMilestone"
          description: "Jalon de la semaine en cours (null si période pré-conception)"

    MedicationReminder:
      type: object
      description: "Rappel de prise de médicament"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        userId:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0f"
        medicationName:
          type: string
          example: "Doliprane"
        dosage:
          type: string
          nullable: true
          example: "1000mg"
        times:
          type: array
          items:
            type: string
            example: "08:00"
          minItems: 1
          description: "Heures de prise au format HH:mm"
          example: ["08:00", "20:00"]
        startDate:
          type: string
          format: date-time
          example: "2025-06-15T00:00:00.000Z"
        endDate:
          type: string
          format: date-time
          nullable: true
          example: "2025-07-15T00:00:00.000Z"
        isActive:
          type: boolean
          example: true
        notifyByEmail:
          type: boolean
          default: true
          example: true
        notifyByPush:
          type: boolean
          default: true
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateMedicationReminderInput:
      type: object
      description: "Payload pour créer un rappel de médicament"
      required: [medicationName, times, startDate]
      properties:
        medicationName:
          type: string
          minLength: 1
          description: "Nom du médicament"
          example: "Doliprane"
        dosage:
          type: string
          description: "Dosage (optionnel, ex: 1000mg, 1 comprimé)"
          example: "1000mg"
        times:
          type: array
          items:
            type: string
            pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          minItems: 1
          description: "Heures de prise au format HH:mm"
          example: ["08:00", "20:00"]
        startDate:
          type: string
          format: date
          description: "Date de début du traitement"
          example: "2025-06-15"
        endDate:
          type: string
          format: date
          nullable: true
          description: "Date de fin du traitement (optionnelle, doit être > startDate)"
          example: "2025-07-15"
        notifyByEmail:
          type: boolean
          default: true
          description: "Notification par email ?"
          example: true
        notifyByPush:
          type: boolean
          default: true
          description: "Notification push ?"
          example: true

    UpdateMedicationReminderInput:
      type: object
      description: "Payload pour modifier un rappel de médicament (tous les champs sont optionnels)"
      properties:
        medicationName:
          type: string
          minLength: 1
          description: "Nom du médicament"
          example: "Doliprane"
        dosage:
          type: string
          nullable: true
          description: "Dosage (passer null pour effacer)"
          example: "500mg"
        times:
          type: array
          items:
            type: string
            pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          minItems: 1
          description: "Heures de prise au format HH:mm"
          example: ["08:00", "20:00"]
        startDate:
          type: string
          format: date
          description: "Date de début du traitement"
          example: "2025-06-15"
        endDate:
          type: string
          format: date
          nullable: true
          description: "Date de fin (null → $unset, valeur omise → inchangée, doit être > startDate)"
          example: null
        notifyByEmail:
          type: boolean
          description: "Notification par email ?"
          example: false
        notifyByPush:
          type: boolean
          description: "Notification push ?"
          example: true

    PushSubscription:
      type: object
      description: "Abonnement push Web"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        userId:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0f"
        endpoint:
          type: string
          description: "Endpoint fourni par le push service du navigateur"
          example: "https://fcm.googleapis.com/fcm/send/..."
        keys:
          type: object
          description: "Clés de chiffrement"
          properties:
            p256dh:
              type: string
              example: "BCi1l6pY..."
            auth:
              type: string
              example: "aGVsbG8..."
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatePushSubscriptionInput:
      type: object
      description: "Payload pour s'abonner aux notifications push"
      required: [endpoint, keys]
      properties:
        endpoint:
          type: string
          description: "Endpoint fourni par PushSubscription du navigateur"
          example: "https://fcm.googleapis.com/fcm/send/..."
        keys:
          type: object
          required: [p256dh, auth]
          properties:
            p256dh:
              type: string
              description: "Clé publique P-256 (Base64 URL-safe)"
              example: "BCi1l6pY..."
            auth:
              type: string
              description: "Secret d'authentification (Base64 URL-safe)"
              example: "aGVsbG8..."

    HydrationReminder:
      type: object
      description: "Configuration de rappels d'hydratation"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        userId:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0f"
        mode:
          type: string
          enum: [fixed_times, interval]
          description: "Mode de configuration"
          example: "fixed_times"
        times:
          type: array
          items:
            type: string
            example: "08:00"
          description: "Heures de rappel générées (fournies en mode fixed_times, auto-générées en mode interval)"
          example: ["08:00", "12:00", "18:00"]
        intervalConfig:
          type: object
          nullable: true
          description: "Configuration d'intervalle (présent uniquement en mode interval)"
          properties:
            startTime:
              type: string
              example: "08:00"
            endTime:
              type: string
              example: "20:00"
            intervalHours:
              type: number
              minimum: 0.5
              maximum: 6
              example: 2
        isActive:
          type: boolean
          example: true
        notifyByEmail:
          type: boolean
          default: true
          example: true
        notifyByPush:
          type: boolean
          default: true
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateHydrationReminderInput:
      type: object
      description: >
        Payload pour créer/mettre à jour la configuration d'hydratation.
        **Contraintes (superRefine) :**
        - `mode === "fixed_times"` → `times` requis (≥ 1 heure),
          `intervalConfig` interdit
        - `mode === "interval"` → `intervalConfig` requis,
          `times` interdit (il sera généré automatiquement)
      required: [mode]
      properties:
        mode:
          type: string
          enum: [fixed_times, interval]
          example: "fixed_times"
        times:
          type: array
          items:
            type: string
            pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          minItems: 1
          description: "Heures de rappel (requis si mode=fixed_times, interdit si mode=interval)"
          example: ["08:00", "12:00", "18:00"]
        intervalConfig:
          type: object
          description: "Configuration d'intervalle (requis si mode=interval, interdit si mode=fixed_times)"
          properties:
            startTime:
              type: string
              pattern: '^([01]\d|2[0-3]):[0-5]\d$'
              example: "08:00"
            endTime:
              type: string
              pattern: '^([01]\d|2[0-3]):[0-5]\d$'
              example: "20:00"
            intervalHours:
              type: number
              minimum: 0.5
              maximum: 6
              description: "Espacement entre rappels (en heures, min 0.5, max 6)"
              example: 2
        notifyByEmail:
          type: boolean
          default: true
          example: true
        notifyByPush:
          type: boolean
          default: true
          example: true

  responses:
    Unauthorized:
      description: "Non authentifié ou session invalide"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            noToken:
              summary: "Token manquant"
              value:
                success: false
                message: "Authentification requise"
            expired:
              summary: "Token expiré ou tokenVersion mismatch"
              value:
                success: false
                message: "Session expirée ou invalide"
