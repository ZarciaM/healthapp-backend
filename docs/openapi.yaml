                    success: false
                    message: "Validation échouée"
                    details:
                      - code: "custom"
                        path: []
                        message: "L'heure de réveil doit être après l'heure de coucher"
                over24h:
                  summary: "Écart > 24h"
                  value:
                    success: false
                    message: "Validation échouée"
                    details:
                      - code: "custom"
                        path: []
                        message: "La durée entre le coucher et le réveil ne peut pas dépasser 24 heures"
                futureDate:
                  summary: "Date dans le futur"
                  value:
                    success: false
                    message: "Validation échouée"
                    details:
                      - code: "custom"
                        path: ["bedTime"]
                        message: "La date de coucher ne peut pas être dans le futur"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /sleep/history:
    get:
      tags: [Sleep]
      summary: "Historique des entrées de sommeil"
      description: >
        Retourne la liste des entrées de sommeil, triées par `bedTime`
        décroissant. Les paramètres `from` et `to` filtrent par plage
        de dates sur `bedTime`. Le paramètre `limit` contrôle le nombre
        de résultats (défaut 50, max 200). `from` doit précéder `to`
        si les deux sont fournis.
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: "Nombre d'entrées (doit être un entier positif)"
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date-time
          description: "Borne inférieure (incluse) sur bedTime"
        - in: query
          name: to
          required: false
          schema:
