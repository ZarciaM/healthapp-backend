  /heart-rate/zones:
    get:
      tags: [HeartRate]
      summary: "Calculer les zones de fréquence cardiaque"
      description: >
        Calcule la fréquence cardiaque maximale et les 5 zones d'effort
        à partir de l'âge et du genre de l'utilisateur.

        **Formules utilisées selon le genre :**
        - gender: **female** → **Gulati** : `FCM = 206 - 0.88 × âge`
        - gender: **male** → **Fox** : `FCM = 220 - âge`

        Une formule **alternative (Tanaka)** est toujours incluse en
        complément (`FCM = 208 - 0.7 × âge`) dans la réponse, présentée
        de façon neutre sans suggérer qu'une formule est meilleure que
        l'autre.

        **Query param :**
        - `?age=N` (optionnel) — surcharge l'âge calculé depuis la date
          de naissance du profil utilisateur (`ageSource: "override"`).
          L'âge doit être un entier entre 1 et 150.

        **Structure de réponse :**
        - `maxHeartRate` : FCM selon la formule principale
        - `formula` : nom de la formule utilisée ("Gulati" ou "Fox")
        - `alternative` : `{ maxHeartRate, formula }` avec Tanaka
        - `zones` : 5 zones d'effort (min, max, label) basées sur la
          formule principale
        - `alternativeZones` : 5 zones d'effort basées sur Tanaka
        - `age`, `gender`, `ageSource`
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: age
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 150
          description: "Âge en années (optionnel, surcharge celui du profil)"
      responses:
        "200":
          description: "Zones de fréquence cardiaque calculées"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Zones de fréquence cardiaque calculées"
                data:
                  result:
                    maxHeartRate: 185
                    formula: "Fox"
                    alternative:
                      maxHeartRate: 173
                      formula: "Tanaka"
                    zones:
                      zone1_warmup:
                        min: 93
                        max: 111
                        label: "Échauffement"
                      zone2_fatBurn:
                        min: 111
                        max: 130
                        label: "Combustion des graisses"
                      zone3_cardio:
                        min: 130
                        max: 148
                        label: "Cardio"
                      zone4_hardcore:
                        min: 148
                        max: 167
                        label: "Intensité élevée"
                      zone5_peak:
                        min: 167
                        max: 185
                        label: "Zone maximale"
                    alternativeZones:
                      zone1_warmup:
                        min: 87
                        max: 104
                        label: "Échauffement"
                      zone2_fatBurn:
                        min: 104
                        max: 121
                        label: "Combustion des graisses"
                      zone3_cardio:
                        min: 121
                        max: 138
                        label: "Cardio"
                      zone4_hardcore:
                        min: 138
                        max: 156
                        label: "Intensité élevée"
                      zone5_peak:
                        min: 156
                        max: 173
                        label: "Zone maximale"
                    age: 35
                    gender: "male"
                    ageSource: "profile"
        "400":
          description: "Âge invalide ou date de naissance manquante"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidAge:
                  summary: "Âge hors limites"
                  value:
                    success: false
                    message: "L'âge doit être un entier compris entre 1 et 150"
                missingBirthDate:
                  summary: "Pas de date de naissance ni d'âge fourni"
                  value:
                    success: false
                    message: "Date de naissance manquante dans votre profil. Fournissez un âge ou renseignez votre date de naissance."
        "401":
          $ref: "#/components/responses/Unauthorized"

  /heart-rate:
    post:
      tags: [HeartRate]
      summary: "Enregistrer une mesure de fréquence cardiaque"
      description: >
        Crée une entrée de fréquence cardiaque. Le champ `context`
        influence l'interprétation du BPM et le message retourné.

        **Interprétation selon le contexte :**
        - `resting` (défaut) : le BPM est évalué par `getPulseCategory`
          (bradycardie < 60, normal 60-100, tachycardie > 100)
        - `after_exercise` : si BPM > 100, la catégorie devient
          `post_exercise_elevation` avec un message rassurant indiquant
          que c'est normal après un effort. Pour tout BPM après
          exercice, le message invite à comparer à contexte similaire.
          **Ce traitement évite d'alarmer inutilement** l'utilisateur
          sur une mesure post-exercice normale.
        - `other` : interprétation standard de `getPulseCategory`
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHeartRateEntryInput"
            example:
              bpm: 72
              context: "resting"
              recordedAt: "2025-06-15T08:00:00.000Z"
      responses:
        "201":
          description: "Entrée de fréquence cardiaque créée"
          content:
