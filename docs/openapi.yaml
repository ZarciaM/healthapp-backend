  /blood-pressure:
    post:
      tags: [BloodPressure]
      summary: "Enregistrer une mesure de tension artérielle"
      description: >
        Crée une entrée de pression artérielle à partir des valeurs
        systolique, diastolique et du pouls. La catégorie et la sévérité
        sont calculées côté serveur par `getBloodPressureCategory`.

        **ATTENTION — Module médicalement sensible :**
        Tous les messages retournés utilisent un langage de suggestion
        ("suggèrent", "recommandons"), jamais de diagnostic médical
        affirmatif.

        **Règle de validation `diastolic - systolic ≤ 10` :**
        La requête est rejetée si la diastolique dépasse la systolique
        de plus de 10 mmHg (signal probable d'inversion des deux
        valeurs). En revanche, **aucun rejet n'a lieu si l'écart est
        faible** (ex: 119/121), pour ne jamais bloquer un cas médical
        réel comme une crise hypertensive diastolique isolée.

        **Calcul de la catégorie :**
        La catégorie et la sévérité sont déterminées selon la valeur
        **la plus sévère** entre systolique et diastolique (pas une
        moyenne, pas une priorité au seul systolic). Les catégories
        possibles sont :

        | Catégorie | Sévérité |
        |---|---|
        | `hypotension` | `elevated` |
        | `normale` | `normal` |
        | `elevee` | `elevated` |
        | `hypertension_stade_1` | `high` |
        | `hypertension_stade_2` | `high` |
        | `crise_hypertensive` | `critical` |

        **Gestion des cas `critical` :**
        Pour `severity: critical`, le message oriente vers une action
        (consultation médicale / urgence) sans alarmisme excessif.

        Le champ `recordedAt` est optionnel ; s'il est omis, la date
        courante est utilisée.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBloodPressureEntryInput"
            example:
              systolic: 130
              diastolic: 85
              pulse: 72
              recordedAt: "2025-06-15T08:00:00.000Z"
      responses:
        "201":
          description: "Entrée de pression artérielle créée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Entrée de pression artérielle créée"
                data:
                  entry:
                    _id: "664a1b2c3d4e5f6a7b8c9d0e"
                    userId: "664a1b2c3d4e5f6a7b8c9d0f"
                    systolic: 130
                    diastolic: 85
                    pulse: 72
                    category: "hypertension_stade_1"
                    severity: "high"
                    message: "Vos valeurs suggèrent une hypertension de stade 1. Nous vous recommandons d'en parler à un professionnel de santé."
                    recordedAt: "2025-06-15T08:00:00.000Z"
                    createdAt: "2025-06-15T08:00:00.000Z"
                    updatedAt: "2025-06-15T08:00:00.000Z"
        "400":
          description: "Données invalides (validation Zod)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invertedValues:
                  summary: "Diastolique anormalement supérieure à systolique"
                  value:
                    success: false
                    message: "Validation échouée"
                    details:
                      - code: "custom"
                        path: []
                        message: "La pression diastolique dépasse anormalement la pression systolique. Vérifiez les valeurs saisies."
        "401":
          $ref: "#/components/responses/Unauthorized"

