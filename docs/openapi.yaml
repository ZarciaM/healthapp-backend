components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
      description: "Cookie httpOnly `accessToken` émis lors de la connexion (POST /api/auth/login)"

  schemas:
    User:
      type: object
      description: "Utilisateur (champ password et refreshTokens exclus du JSON)"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        email:
          type: string
          format: email
          example: "user@example.com"
        firstName:
          type: string
          example: "Jean"
        lastName:
          type: string
          example: "Dupont"
        gender:
          type: string
          enum: [male, female]
          nullable: true
          example: "male"
        dateOfBirth:
          type: string
          format: date-time
          nullable: true
          example: "1990-05-15T00:00:00.000Z"
        authProvider:
          type: string
          enum: [local, google]
          example: "local"
        googleId:
          type: string
          nullable: true
          example: "1234567890"
        tokenVersion:
          type: integer
          default: 0
          example: 2
        timezone:
          type: string
          default: "UTC"
          example: "Europe/Paris"
        isEmailVerified:
          type: boolean
          default: false
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
          example: true
        message:
          type: string
          example: "Opération réussie"
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [false]
          example: false
        message:
          type: string
          example: "Une erreur est survenue"
        details:
          type: array
          description: "Détails additionnels (présent uniquement sur les erreurs de validation)"
          items:
            type: object

    HealthProfile:
      type: object
      description: "Profil santé complet de l'utilisateur (wizard onboarding multi-étapes)"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        userId:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0f"
        height:
          type: number
          nullable: true
          description: "Taille en cm (étape 1)"
          example: 175
        currentWeight:
          type: number
          nullable: true
          description: "Poids actuel en kg (étape 1)"
          example: 75
        activityLevel:
          type: string
          nullable: true
          enum: [sedentary, light, moderate, active, very_active]
          description: "Niveau d'activité (étape 2)"
          example: "moderate"
        goal:
          type: string
          nullable: true
          enum: [lose_weight, gain_weight, maintain, general_health]
          description: "Objectif santé (étape 2)"
          example: "maintain"
        medicalHistory:
          type: object
          description: "Antécédents médicaux (étape 3)"
          properties:
            hypertension:
              type: boolean
              default: false
            diabetes:
              type: boolean
              default: false
            allergies:
              type: array
              items:
                type: string
              default: []
            currentMedications:
              type: array
              items:
                type: string
              default: []
        lifestyle:
          type: object
          nullable: true
          description: "Style de vie (étape 4)"
          properties:
            averageSleepHours:
              type: number
              example: 7
            smoker:
              type: boolean
              example: false
            alcoholConsumption:
              type: string
              enum: [none, occasional, regular]
              example: "occasional"
        womenSpecific:
          type: object
          nullable: true
          description: "Informations spécifiques aux femmes (étape 5, uniquement si gender: female)"
          properties:
            cycleRegularity:
              type: string
              enum: [regular, irregular]
              example: "regular"
            lastPeriodDate:
              type: string
              format: date-time
              nullable: true
              example: "2025-06-15T00:00:00.000Z"
            averageCycleLength:
              type: number
              example: 28
        onboardingStep:
          type: integer
          description: "Étape actuelle du wizard (0 = pas commencé)"
          default: 0
          example: 4
        isCompleted:
          type: boolean
          description: "Toutes les étapes obligatoires (1-4) sont-elles complétées ?"
          default: false
          example: true
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: "Date à laquelle le profil a été marqué comme complété"
          example: "2025-06-15T10:00:00.000Z"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OnboardingStatus:
      type: object
      description: "Statut d'avancement du wizard onboarding"
      properties:
        isCompleted:
          type: boolean
          example: false
        currentStep:
          type: integer
          description: "Dernière étape complétée (0 = aucune)"
          example: 2
        totalSteps:
          type: integer
          description: "Nombre total d'étapes (4 pour un homme, 5 pour une femme)"
          example: 5

    Step1Input:
      type: object
      description: "Étape 1 — Mesures de base (taille et poids)"
      required: [height, currentWeight]
      properties:
        height:
          type: number
          minimum: 50
          maximum: 250
          description: "Taille en cm"
          example: 175
        currentWeight:
          type: number
          minimum: 20
          maximum: 300
          description: "Poids en kg"
          example: 75

    Step2Input:
      type: object
      description: "Étape 2 — Activité physique et objectif"
      required: [activityLevel, goal]
      properties:
        activityLevel:
          type: string
          enum: [sedentary, light, moderate, active, very_active]
          description: "Niveau d'activité quotidienne"
          example: "moderate"
        goal:
          type: string
          enum: [lose_weight, gain_weight, maintain, general_health]
          description: "Objectif principal"
          example: "maintain"

    Step3Input:
      type: object
      description: "Étape 3 — Antécédents médicaux"
      required: [medicalHistory]
      properties:
        medicalHistory:
          type: object
          required: [hypertension, diabetes, allergies, currentMedications]
          properties:
            hypertension:
              type: boolean
              example: false
            diabetes:
              type: boolean
              example: false
            allergies:
              type: array
              items:
                type: string
              maxItems: 20
              example: ["pollen"]
            currentMedications:
              type: array
              items:
                type: string
              maxItems: 20
              example: ["Vitamine D"]

    Step4Input:
      type: object
      description: "Étape 4 — Style de vie"
      required: [lifestyle]
      properties:
        lifestyle:
          type: object
          required: [averageSleepHours, smoker, alcoholConsumption]
          properties:
            averageSleepHours:
              type: number
              minimum: 0
              maximum: 24
              description: "Heures de sommeil moyennes par nuit"
              example: 7
            smoker:
              type: boolean
              example: false
            alcoholConsumption:
              type: string
              enum: [none, occasional, regular]
              example: "occasional"

    Step5WomenInput:
      type: object
      description: "Étape 5 — Spécifique femme (uniquement si gender: female)"
      required: [womenSpecific]
      properties:
        womenSpecific:
          type: object
          required: [cycleRegularity, lastPeriodDate, averageCycleLength]
          properties:
            cycleRegularity:
              type: string
              enum: [regular, irregular]
              description: "Régularité du cycle menstruel"
              example: "regular"
            lastPeriodDate:
              type: string
              format: date
              description: "Date des dernières règles (ne peut pas être dans le futur)"
              example: "2025-06-15"
            averageCycleLength:
              type: number
              minimum: 15
              maximum: 45
              description: "Durée moyenne du cycle en jours"
              example: 28

    BmiEntry:
      type: object
      description: "Entrée IMC (stockée dans la collection BmiEntry, partagée entre les modules BMI et Weight)"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        userId:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0f"
        weight:
          type: number
          description: "Poids en kg"
          example: 75
        height:
          type: number
          description: "Taille en cm"
          example: 175
        bmiValue:
          type: number
          description: "Valeur IMC calculée (arrondie à 1 décimale)"
          example: 24.5
        category:
          type: string
          enum: [insuffisance_ponderale, poids_normal, surpoids, obesite]
          description: "Catégorie IMC déterminée par getBMICategory"
          example: "poids_normal"
        recordedAt:
          type: string
          format: date-time
          description: "Date de la mesure (peut différer de createdAt si fournie par le client)"
          example: "2025-06-15T08:00:00.000Z"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateBmiEntryInput:
      type: object
      description: "Payload pour la création d'une entrée IMC (réutilisé par Weight)"
      required: [weight, height]
      properties:
        weight:
          type: number
          minimum: 20
          maximum: 300
          description: "Poids en kg"
          example: 75
        height:
          type: number
          minimum: 50
          maximum: 250
          description: "Taille en cm"
          example: 175
        recordedAt:
          type: string
          format: date-time
          description: "Date de la mesure (optionnelle, défaut: Date.now). Ne peut pas être dans le futur."
          example: "2025-06-15T08:00:00.000Z"

    WeightGoal:
      type: object
      description: "Objectif de poids (collection WeightGoal, un document unique par utilisateur via upsert)"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        userId:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0f"
        targetWeight:
          type: number
          description: "Poids cible en kg"
          example: 70
        targetDate:
          type: string
          format: date-time
          nullable: true
          description: "Date cible optionnelle (doit être dans le futur si fournie)"
          example: "2025-12-31T00:00:00.000Z"
        startingWeight:
          type: number
          description: "Poids de départ (initialisé à la dernière pesée lors de la création)"
          example: 75
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SetWeightGoalInput:
      type: object
      description: "Payload pour créer/mettre à jour un objectif de poids"
      required: [targetWeight]
      properties:
        targetWeight:
          type: number
          minimum: 20
          maximum: 300
          description: "Poids cible en kg"
          example: 70
        targetDate:
          type: string
          format: date-time
          description: "Date cible optionnelle (doit être dans le futur si fournie)"
          example: "2025-12-31T00:00:00.000Z"

    WeightProgress:
      type: object
      description: "Progression vers l'objectif de poids (contenu dans data.progress)"
      properties:
        goal:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/WeightGoal"
          description: "Objectif de poids ou null si aucun n'est défini"
        currentWeight:
          type: number
          nullable: true
          description: "Dernier poids enregistré ou null si aucune pesée"
          example: 73
        startingWeight:
          type: number
          nullable: true
          description: "Poids de départ au moment de la définition de l'objectif"
          example: 75
        weightChange:
          type: number
          nullable: true
          description: "Différence currentWeight - startingWeight (négatif = perte, positif = gain)"
          example: -2
        percentToGoal:
          type: number
          nullable: true
          description: "Pourcentage de progression vers l'objectif (0-100, null si non calculable)"
          example: 40
        message:
          type: string
          description: "Message factuel sur la progression (neutre même si l'évolution va dans le sens inverse de l'objectif)"
          example: "Vous avez perdu 2.0 kg sur les 5.0 kg visés (40% de votre objectif)."

    CaloriesCalculation:
      type: object
      description: "Résultat du calcul des besoins caloriques (contenu dans data.result)"
      properties:
        bmr:
          type: number
          description: "Métabolisme de base (Mifflin-St Jeor)"
          example: 1696
        tdee:
          type: number
          description: "Dépense énergétique totale (BMR × multiplicateur d'activité)"
          example: 2629
        recommendedCalories:
          type: number
          description: "Calories recommandées ajustées selon l'objectif (avec plancher de sécurité 1200/1500 kcal)"
          example: 1500
        message:
          type: string
          description: "Message explicatif sur les recommandations (contient la mention du plancher si appliqué)"
          example: "Un déficit modéré de 500 kcal par jour est recommandé pour une perte de poids progressive et durable."
        sourceData:
          type: object
          description: "Données sources utilisées pour le calcul"
          required: [weight, height, age, gender, activityLevel, goal, weightSource]
          properties:
            weight:
              type: number
              example: 75
            height:
              type: number
              example: 175
            age:
              type: integer
              example: 35
            gender:
              type: string
              enum: [male, female]
              example: "male"
            activityLevel:
              type: string
              enum: [sedentary, light, moderate, active, very_active]
              example: "moderate"
            goal:
              type: string
              enum: [lose_weight, gain_weight, maintain, general_health]
              example: "lose_weight"
            weightSource:
              type: string
              enum: [override, latest_entry, health_profile]
              description: "Source ayant fourni le poids utilisé par le calcul"
              example: "latest_entry"

    WaterCalculation:
      type: object
      description: "Résultat du calcul des besoins hydriques (contenu dans data.result)"
      properties:
        totalMl:
          type: number
          description: "Besoins hydriques totaux en ml (plafonné à 5000, plancher à 1500)"
          example: 2625
        breakdown:
          type: object
          description: "Détail des composantes du calcul"
          required: [base, activityBonus, climateBonus]
          properties:
            base:
              type: number
              description: "Base calculée à partir du poids (35 ml × kg)"
              example: 2625
            activityBonus:
              type: number
              description: "Bonus activité physique (0-900 ml selon le niveau)"
              example: 350
            climateBonus:
              type: number
              description: "Bonus climatique (500 ml si 'hot', sinon 0)"
              example: 0
        message:
          type: string
          description: "Message explicatif (contient la mention du plancher/plafond si appliqué)"
          example: "Cette recommandation correspond à vos besoins hydriques quotidiens estimés."
        sourceData:
          type: object
          description: "Données sources utilisées pour le calcul"
          required: [weight, weightSource, activityLevel, climate]
          properties:
            weight:
              type: number
              example: 75
            weightSource:
              type: string
              enum: [override, latest_entry, health_profile]
              description: "Source ayant fourni le poids"
              example: "latest_entry"
            activityLevel:
              type: string
              enum: [sedentary, light, moderate, active, very_active]
              example: "moderate"
            climate:
              type: string
              enum: [normal, hot]
              example: "normal"

    SleepEntry:
      type: object
      description: "Entrée de sommeil"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        userId:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0f"
        bedTime:
          type: string
          format: date-time
          description: "Date et heure du coucher (date ISO complète, pas seulement l'heure)"
          example: "2025-06-15T23:00:00.000Z"
        wakeTime:
          type: string
          format: date-time
          description: "Date et heure du réveil (date ISO complète, pas seulement l'heure)"
          example: "2025-06-16T07:30:00.000Z"
        durationMinutes:
          type: integer
          description: "Durée du sommeil en minutes (calculée côté serveur)"
          example: 510
        quality:
          type: integer
          minimum: 1
          maximum: 5
          description: "Qualité subjective du sommeil (1 = très mauvaise, 5 = excellente)"
          example: 4
        recordedAt:
          type: string
          format: date-time
          description: "Date d'enregistrement (défaut: Date.now)"
          example: "2025-06-16T07:30:00.000Z"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateSleepEntryInput:
      type: object
      description: "Payload pour créer une entrée de sommeil"
      required: [bedTime, wakeTime, quality]
      properties:
        bedTime:
          type: string
          format: date-time
          description: "Date et heure du coucher (ISO complète). Ne peut pas être dans le futur."
          example: "2025-06-15T23:00:00.000Z"
        wakeTime:
          type: string
          format: date-time
          description: "Date et heure du réveil (ISO complète). Doit être après bedTime, écart max 24h. Ne peut pas être dans le futur."
          example: "2025-06-16T07:30:00.000Z"
        quality:
          type: integer
          minimum: 1
          maximum: 5
          description: "Qualité subjective du sommeil"
          example: 4

    SleepAverages:
      type: object
      description: "Moyennes de sommeil sur une période (contenu dans data.averages)"
      properties:
        averageDurationMinutes:
          type: number
          description: "Durée moyenne en minutes (arrondie à l'entier). 0 si aucune donnée."
          example: 458
        averageQuality:
          type: number
          description: "Qualité moyenne (arrondie à 1 décimale). 0 si aucune donnée."
          example: 3.7
        entriesCount:
          type: integer
          description: "Nombre d'entrées sur la période. 0 si aucune donnée (pas de NaN)."
          example: 12
        message:
          type: string
          description: "Message indiquant le nombre de nuits analysées ou l'absence de données"
          example: "Moyennes calculées sur 12 nuits (7 derniers jours)"

    BloodPressureEntry:
      type: object
      description: "Entrée de pression artérielle"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        userId:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0f"
        systolic:
          type: integer
          description: "Pression systolique en mmHg"
          example: 130
        diastolic:
          type: integer
          description: "Pression diastolique en mmHg"
          example: 85
        pulse:
          type: integer
          description: "Pouls en bpm"
          example: 72
        category:
          type: string
          enum: [hypotension, normale, elevee, hypertension_stade_1, hypertension_stade_2, crise_hypertensive]
          description: "Catégorie déterminée par getBloodPressureCategory (selon la valeur la plus sévère entre systolique et diastolique)"
          example: "hypertension_stade_1"
        severity:
          type: string
          enum: [normal, elevated, high, critical]
          description: "Sévérité associée à la catégorie"
          example: "high"
        recordedAt:
          type: string
          format: date-time
          description: "Date de la mesure (peut différer de createdAt si fournie par le client)"
          example: "2025-06-15T08:00:00.000Z"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateBloodPressureEntryInput:
      type: object
      description: "Payload pour créer une mesure de pression artérielle"
      required: [systolic, diastolic, pulse]
      properties:
        systolic:
          type: integer
          minimum: 50
          maximum: 250
          description: "Pression systolique en mmHg (nombre entier)"
          example: 130
        diastolic:
          type: integer
          minimum: 30
          maximum: 150
          description: "Pression diastolique en mmHg (nombre entier). Ne doit pas dépasser systolic de plus de 10."
          example: 85
        pulse:
          type: integer
          minimum: 30
          maximum: 220
          description: "Pouls en bpm (nombre entier)"
          example: 72
        recordedAt:
          type: string
          format: date-time
          description: "Date de la mesure (optionnelle, défaut: Date.now). Ne peut pas être dans le futur."
          example: "2025-06-15T08:00:00.000Z"

    BloodPressureAverages:
      type: object
      description: "Moyennes de pression artérielle sur une période (contenu dans data.averages)"
      properties:
        averageSystolic:
          type: number
          description: "Moyenne systolique (arrondie à 1 décimale). 0 si aucune donnée."
          example: 128.5
        averageDiastolic:
          type: number
          description: "Moyenne diastolique (arrondie à 1 décimale). 0 si aucune donnée."
          example: 82.3
        averagePulse:
          type: number
          description: "Moyenne du pouls (arrondie à 1 décimale). 0 si aucune donnée."
          example: 71.0
        entriesCount:
          type: integer
          description: "Nombre d'entrées sur la période. 0 si aucune donnée (pas de NaN)."
          example: 15
        overallCategory:
          type: object
          description: "Catégorie globale déterminée à partir des moyennes arrondies via getBloodPressureCategory"
          properties:
            category:
              type: string
              enum: [aucune_donnee, hypotension, normale, elevee, hypertension_stade_1, hypertension_stade_2, crise_hypertensive]
              example: "hypertension_stade_1"
            severity:
              type: string
              enum: ["", normal, elevated, high, critical]
              description: "Sévérité (chaîne vide si aucune donnée)"
              example: "high"
            message:
              type: string
              description: "Message médicalement prudent (langage de suggestion, pas de diagnostic)"
              example: "Vos valeurs suggèrent une hypertension de stade 1. Nous vous recommandons d'en parler à un professionnel de santé."

    HeartRateZones:
      type: object
      description: "Zones de fréquence cardiaque calculées (contenu dans data.result)"
      properties:
        maxHeartRate:
          type: integer
          description: "FCM selon la formule principale (Gulati pour femme, Fox pour homme)"
          example: 185
        formula:
          type: string
          enum: [Gulati, Fox]
          description: "Formule utilisée pour le calcul principal"
          example: "Fox"
        alternative:
          type: object
          description: "Formule alternative Tanaka (toujours incluse, présentée de façon neutre)"
          properties:
            maxHeartRate:
              type: integer
              example: 173
            formula:
              type: string
              enum: [Tanaka]
              example: "Tanaka"
        zones:
          type: object
          description: "5 zones d'effort basées sur la formule principale"
          properties:
            zone1_warmup:
              $ref: "#/components/schemas/HeartRateZone"
            zone2_fatBurn:
              $ref: "#/components/schemas/HeartRateZone"
            zone3_cardio:
              $ref: "#/components/schemas/HeartRateZone"
            zone4_hardcore:
              $ref: "#/components/schemas/HeartRateZone"
            zone5_peak:
              $ref: "#/components/schemas/HeartRateZone"
        alternativeZones:
          type: object
          description: "5 zones d'effort basées sur la formule alternative Tanaka"
          properties:
            zone1_warmup:
              $ref: "#/components/schemas/HeartRateZone"
            zone2_fatBurn:
              $ref: "#/components/schemas/HeartRateZone"
            zone3_cardio:
              $ref: "#/components/schemas/HeartRateZone"
            zone4_hardcore:
              $ref: "#/components/schemas/HeartRateZone"
            zone5_peak:
              $ref: "#/components/schemas/HeartRateZone"
        age:
          type: integer
          example: 35
        gender:
          type: string
          enum: [male, female]
          example: "male"
        ageSource:
          type: string
          enum: [override, profile]
          description: "Source de l'âge utilisé pour le calcul"
          example: "profile"

    HeartRateZone:
      type: object
      description: "Une zone d'effort cardiaque"
      properties:
        min:
          type: integer
          description: "BPM minimum de la zone"
          example: 130
        max:
          type: integer
          description: "BPM maximum de la zone"
          example: 148
        label:
          type: string
          description: "Libellé de la zone en français"
          example: "Cardio"

    HeartRateEntry:
      type: object
      description: "Entrée de fréquence cardiaque"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        userId:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0f"
        bpm:
          type: integer
          description: "Battements par minute"
          example: 72
        category:
          type: string
          enum: [bradycardie, normal, tachycardie, post_exercise_elevation]
          description: "Catégorie déterminée par getPulseCategory (peut être post_exercise_elevation si context=after_exercise et bpm > 100)"
          example: "normal"
        context:
          type: string
          enum: [resting, after_exercise, other]
          description: "Contexte de la mesure"
          example: "resting"
        recordedAt:
          type: string
          format: date-time
          example: "2025-06-15T08:00:00.000Z"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateHeartRateEntryInput:
      type: object
      description: "Payload pour créer une mesure de fréquence cardiaque"
      required: [bpm]
      properties:
        bpm:
          type: integer
          minimum: 30
          maximum: 220
          description: "Battements par minute (nombre entier)"
          example: 72
        context:
          type: string
          enum: [resting, after_exercise, other]
          default: resting
          description: "Contexte de la mesure (défaut: resting)"
          example: "resting"
        recordedAt:
          type: string
          format: date-time
          description: "Date de la mesure (optionnelle, défaut: Date.now). Ne peut pas être dans le futur."
          example: "2025-06-15T08:00:00.000Z"

    HeartRateAverages:
      type: object
      description: "Moyennes de fréquence cardiaque sur une période (contenu dans data.averages)"
      properties:
        averageBpm:
          type: number
          description: "Moyenne du BPM (arrondie à 1 décimale). 0 si aucune donnée."
          example: 68.5
        entriesCount:
          type: integer
          description: "Nombre d'entrées sur la période. 0 si aucune donnée (pas de NaN)."
          example: 25
        message:
          type: string
          description: "Message indiquant le nombre de mesures analysées ou l'absence de données"
          example: "Moyenne calculée sur 25 mesures (7 derniers jours)"

    BodyFatEntry:
      type: object
      description: "Entrée de mesure de graisse corporelle (méthode US Navy)"
      properties:
        _id:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0e"
        userId:
          type: string
          pattern: "^[a-f0-9]{24}$"
          example: "664a1b2c3d4e5f6a7b8c9d0f"
        neckCm:
          type: number
          description: "Tour de cou en cm"
          example: 38
        waistCm:
          type: number
          description: "Tour de taille en cm"
          example: 85
        hipCm:
          type: number
          nullable: true
          description: "Tour de hanches en cm (null si homme, obligatoire si femme)"
          example: null
        heightCm:
          type: number
          description: "Taille en cm"
          example: 175
        bodyFatPercent:
          type: number
          description: "Pourcentage de graisse corporelle calculé (arrondi à 1 décimale)"
          example: 18.5
        category:
          type: string
          enum: [essentiel, athletique, fitness, moyen, au_dessus_de_la_moyenne]
          description: "Catégorie déterminée par getBodyFatCategory"
          example: "fitness"
        recordedAt:
          type: string
          format: date-time
          example: "2025-06-15T08:00:00.000Z"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateBodyFatEntryInput:
      type: object
      description: "Payload pour créer une mesure de graisse corporelle"
      required: [neckCm, waistCm, heightCm]
      properties:
        neckCm:
          type: number
          minimum: 20
          maximum: 60
          description: "Tour de cou en cm"
          example: 38
        waistCm:
          type: number
          minimum: 40
          maximum: 200
          description: "Tour de taille en cm. Doit être strictement supérieur à neckCm."
          example: 85
        hipCm:
          type: number
          minimum: 40
          maximum: 200
          description: "Tour de hanches en cm. Optionnel au niveau validation mais obligatoire si gender: female (vérifié au niveau service). Ignoré si gender: male."
          example: 95
        heightCm:
          type: number
          minimum: 50
          maximum: 250
          description: "Taille en cm"
          example: 175
        recordedAt:
          type: string
          format: date-time
          description: "Date de la mesure (optionnelle, défaut: Date.now). Ne peut pas être dans le futur."
          example: "2025-06-15T08:00:00.000Z"

  responses:
    Unauthorized:
      description: "Non authentifié ou session invalide"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            noToken:
              summary: "Token manquant"
              value:
                success: false
                message: "Authentification requise"
            expired:
              summary: "Token expiré ou tokenVersion mismatch"
              value:
                success: false
                message: "Session expirée ou invalide"
