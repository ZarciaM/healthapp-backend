  /bmi/{id}:
    delete:
      tags: [BMI]
      summary: "Supprimer une entrée IMC"
      description: >
        Supprime une entrée IMC. Le middleware `validateObjectId` vérifie
        que l'ID est un ObjectId MongoDB valide (sinon 400). La
        suppression est protégée contre les attaques IDOR : le service
        vérifie que l'entrée appartient bien à l'utilisateur connecté
        (sinon 403). Si l'ObjectId est valide mais l'entrée introuvable,
        une erreur 404 est retournée.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{24}$"
          description: "ObjectId MongoDB de l'entrée IMC"
      responses:
        "200":
          description: "Entrée IMC supprimée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                message: "Entrée IMC supprimée"
        "400":
          description: "ID malformé (ObjectId invalide)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "ID invalide"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Tentative de suppression d'une entrée ne vous appartenant pas (IDOR)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Vous ne pouvez pas supprimer une entrée qui ne vous appartient pas"
        "404":
          description: "Entrée introuvable"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Entrée IMC introuvable"

